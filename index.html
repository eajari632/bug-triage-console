// Compliance/regulatory risk signals used for severity escalation
// Compliance signals: only language that raises genuine legal, regulatory, or policy concerns.
// Operational workflow terms (collections, escalation, routing) are intentionally excluded.
const COMPLIANCE_SIGNALS = [
  "arrested","arrest","jail","prison",
  "unlawful","illegal","lawsuit","sue","court",
  "threatening","threatened","coerce","coercion",
  "harassment","harass","abusive",
  "prohibited","policy violation","regulatory violation",
  "deceptive","false statement","non-compliant"
];

const SEV_RULES = [
  {
    level: "Sev0", label: "Stop-ship / Outage",
    color: "#A32D2D", bg: "#FCEBEB", border: "#F09595",
    desc: "Agent cannot place or receive calls, widespread failures affecting all or most customers, critical data not being saved, or a compliance-impacting systemic issue. Requires immediate escalation and an active incident bridge.",
    keywords: ["outage","nothing is saving","cannot place","cannot receive","dropped to near zero","500 error","widespread","carrier connect rate dropped","file not found for many"],
    impactBoost: {Outage: 2}
  },
  {

    color: "#854F0B", bg: "#FAEEDA", border: "#FAC775",
    desc: "Many calls affected with a materially broken experience: frequent failures, high customer impact, significant business risk. No reliable workaround. Requires same-day resolution.",
    keywords: ["many callers","all calls","every call","always","keeps","every customer","policy violation","collections escalation","loop even after","double-log"],
    impactBoost: {"Many callers": 1}
  },
  {
    level: "Sev2", label: "Moderate",

    desc: "Intermittent or limited-scope issue affecting a subset of calls. A workaround may exist. Impacts some customers but the system remains broadly functional. Target fix within 2 to 3 business days.",
    keywords: ["sometimes","intermittent","subset","long calls","certain","occasional","8-12 seconds"],
    impactBoost: {"Single caller": -1}
  },
  {
    level: "Sev3", label: "Minor",
    color: "#534AB7", bg: "#EEEDFE", border: "#AFA9EC",
    desc: "Cosmetic issue, edge-case confusion, or low-frequency problem with minimal customer impact. Does not materially affect call outcomes. Fix in next sprint.",
    keywords: ["cosmetic","minor","edge case","low impact","one hundred twenty","number pronunciation","reads the amount as"]
  }

const BKT_COLOR = {

  TTS:      {t:"#0F6E56", bg:"#E1F5EE", b:"#5DCAA5"},
  LLM:      {t:"#993556", bg:"#FBEAF0", b:"#ED93B1"},
  POST_CALL:{t:"#854F0B", bg:"#FAEEDA", b:"#EF9F27"},
  INFRA:    {t:"#3C3489", bg:"#EEEDFE", b:"#7F77DD"}
};

const ROUTING = {

    qs: [

      "What language or accent is the caller speaking?",

  },

  },

const TEST = [

  {id:10, text:"Agent misunderstands Spanish callers; keeps responding in English even when they ask '¿Habla español?'",                 customer:"Multilingual LLC",  impact:"Many callers"},

  {id:12, text:"On long calls, the voice response starts taking 8-12 seconds to speak back.",                                            customer:"LongCall Co",      impact:"Single caller"},
  {id:13, text:"Customer says they already paid; agent still insists they haven't and won't check. Bad account lookup/tool use.",        customer:"ResolveNow",       impact:"Single caller"},

/* ─── SCORING ENGINE ────────────────────────────────────────────── */

function scoreReport(text, impact) {
  const lower = text.toLowerCase();

  // Per-bucket keyword scoring
  const scores = {}, evidenceMap = {};
  for (const b of BUCKET_RULES) {
    let s = 0, hits = [];
    for (const k of b.keywords) {
      if (lower.includes(k.toLowerCase())) { s++; hits.push(k); }
    }
    scores[b.id] = s;
    evidenceMap[b.id] = hits;
  }

  // Multilingual edge case: if STT wins and LLM also has signal for language routing,
  // force LLM as a secondary tag with an explanatory note
  const isMultilingual = lower.includes("spanish") || lower.includes("habla") ||
    lower.includes("misunderstands spanish") || lower.includes("responding in english");
  if (isMultilingual && scores["STT"] >= scores["LLM"]) {
    // Ensure LLM appears as secondary even if it scored 0
    scores["LLM"] = Math.max(scores["LLM"], 0.5);
  }

  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const primary = sorted[0][0];
  const topScore = sorted[0][1];
  const allSecondaries = sorted.filter(([id, s]) => id !== primary && s > 0).map(([id]) => id);

  // Confidence with rationale
  let confidence, confRationale;
  const effectiveScore = Math.floor(topScore);
  if (effectiveScore >= 3) {
    confidence = "High";
    confRationale = `${effectiveScore} keyword matches for ${primary}, which is a strong signal well above threshold.`;
  } else if (effectiveScore === 2) {
    confidence = "High";
    confRationale = `${effectiveScore} keyword matches for ${primary}. Sufficient for a reliable classification; recommend confirming with call recording.`;
  } else if (effectiveScore === 1) {
    confidence = "Med";
    confRationale = `Only 1 keyword matched for ${primary}. Classification is plausible but thin. A human reviewer should sanity-check before routing.`;
  } else {
    confidence = "Low";
    confRationale = `No keyword matches found for any bucket. The report language may be too vague or novel. Human judgment required. Do not route without manual review.`;
  }

  if (isMultilingual && primary === "STT") {
    confRationale += " Note: multilingual failure detected. STT is primary (transcription is likely wrong or in the wrong language), but LLM is flagged as secondary because the agent's choice to respond in English may also reflect a prompt-level language routing gap. Both teams should review.";
  } else if (allSecondaries.length > 0) {
    confRationale += ` Note: secondary signal also detected for ${allSecondaries.join(", ")}. This may be a cross-cutting issue.`;
  }

  // Compliance risk detection
  const complianceHits = COMPLIANCE_SIGNALS.filter(k => lower.includes(k));
  const hasComplianceRisk = complianceHits.length > 0;

  // Severity scoring
  let sevScore = [0, 0, 0, 0], sevEvidence = [];
  for (let i = 0; i < SEV_RULES.length; i++) {
    const r = SEV_RULES[i];
    for (const k of r.keywords) {
      if (lower.includes(k.toLowerCase())) { sevScore[i] += 2; sevEvidence.push(k); }
    }
    if (r.impactBoost && r.impactBoost[impact]) sevScore[i] += r.impactBoost[impact];
  }

  // Compliance escalation: boost Sev1 by 1 if compliance risk is present but not already Sev0.
  // We do NOT auto-promote all compliance issues to Sev0 because some (e.g. a single isolated
  // threatening statement) are serious but not systemic outages. Sev0 is reserved for systemic
  // or widespread compliance failures. A single incident with compliance risk lands at Sev1
  // and the rationale explains why.
  if (hasComplianceRisk) {
    sevScore[1] += 3; // strong push toward Sev1
  }

  let si = sevScore.indexOf(Math.max(...sevScore));
  if (Math.max(...sevScore) === 0) si = 2;

  // Duplicate-transaction special case: limited/intermittent scope = Sev2.
  // Escalate to Sev1 only when there is evidence of broader impact or financial harm.
  const isDuplicateTransaction = lower.includes("duplicate transaction") || lower.includes("double-log") || lower.includes("double logs") || lower.includes("payment event");
  if (isDuplicateTransaction) {
    const broadImpactSignals = ["many callers","multiple customers","widespread","all payments","financial reconciliation","customers charged twice","duplicate charges","systemic"];
    const limitedScopeSignals = ["sometimes","occasionally","intermittent","single caller","one customer","isolated","limited scope","subset","observed in some","a few cases"];
    const hasBroadImpact = broadImpactSignals.some(s => lower.includes(s));
    const hasLimitedScope = limitedScopeSignals.some(s => lower.includes(s)) || impact === "Single caller";
    if (!hasBroadImpact && hasLimitedScope) {
      si = 2; // Sev2: intermittent or limited-scope payment logging issue
    }
  }

  const severity = SEV_RULES[si];

  let sevRationale;
  if (hasComplianceRisk) {
    // Rationale derives from the actual resolved severity (si), not a separate branch,
    // so the rationale text always agrees with the displayed badge.
    const sevLabel = SEV_RULES[si].level;
    if (si === 0) {
      sevRationale = `Compliance or regulatory risk detected (matched: "${complianceHits.slice(0,2).join('", "')}" ). Impact reported as "${impact}". Classified ${sevLabel}: widespread or systemic compliance failure. Escalate immediately and loop in legal or compliance review.`;
    } else {
      sevRationale = `Compliance or regulatory risk detected (matched: "${complianceHits.slice(0,2).join('", "')}" ). Impact reported as "${impact}". Classified ${sevLabel} because the incident appears isolated rather than systemic. Sev0 is reserved for widespread compliance failures. Legal or compliance review is still strongly recommended regardless of severity level.`;
    }
  } else if (isDuplicateTransaction && impact === "Single caller") {
    sevRationale = `Duplicate transaction logging is a data integrity concern but the impact is reported as "${impact}" and the behavior is intermittent ("sometimes"). Classified Sev2 (Moderate) as the scope is limited. Escalate to Sev1 if duplicate events are confirmed across multiple customers or if financial reconciliation is affected.`;
  } else if (sevEvidence.length) {
    sevRationale = `Matched severity keywords: "${sevEvidence.slice(0,3).join('", "')}". Impact reported as "${impact}"${severity.impactBoost && severity.impactBoost[impact] ? ` (adjusted by impact level)` : ""}.`;
  } else {
    sevRationale = `No strong severity keywords detected. Defaulting to Sev2 (Moderate) as a conservative baseline. Impact reported as "${impact}". Adjust if scope is confirmed broader or narrower.`;
  }

  return {
    primary, allSecondaries,
    confidence, confRationale,
    evidence: [...new Set(evidenceMap[primary])],
    allEvidence: evidenceMap,
    severity, sevRationale,
    complianceRisk: hasComplianceRisk,
    complianceHits,
    routing: ROUTING[primary],
    bucketWhy: BUCKET_RULES.find(b => b.id === primary).why
  };
}

/* ─── CSV EXPORT ────────────────────────────────────────────────── */

function exportCSV(queue) {
  const esc = v => `"${String(v || "").replace(/"/g, '""')}"`;
  const ts = new Date().toLocaleString();
  const meta = [
    [esc("Prototype"), esc("Bug Triage Console")].join(","),
    [esc("Author"), esc("Esther Ajari")].join(","),
    [esc("Purpose"), esc("Founder's Office Case Study Submission")].join(","),
    [esc("Generated"), esc(ts)].join(","),
    ["", ""].join(","), // blank separator row
  ];
  const cols = [
    "Triage Timestamp","Customer","Call ID","Impact","Bug Report",
    "Bucket","Secondary Tag(s)","Severity","Confidence","Confidence Rationale",
    "Evidence Phrases","Severity Rationale","Primary Routing Team","Secondary Routing Team","Status",
    "Override Applied","Override Note"
  ];
  const rows = queue.map(it => [
    it.timestamp,
    it.customer,
    it.callId || "",
    it.impact,
    it.text,
    it.finalBucket,
    it.result.allSecondaries.join("; "),
    it.finalSev,
    it.result.confidence,
    it.result.confRationale,
    it.result.evidence.join("; "),
    it.result.sevRationale,
    it.result.routing.team,
    it.result.allSecondaries.map(sid => ROUTING[sid]?.team || "").filter(Boolean).join("; "),
    it.status,
    it.overrideNote ? "Yes" : "No",
    it.overrideNote || ""
  ].map(esc).join(","));
  const csv = [...meta, cols.map(esc).join(","), ...rows].join("\n");
  const blob = new Blob([csv], {type: "text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "esther-ajari-bug-triage-console.csv";
  a.click();
}

/* ─── COMPONENTS ────────────────────────────────────────────────── */

function Badge({label, c, small}) {
  return (
    <span className="inline-tag" style={{fontSize: small ? 10 : 11, color: c.t, background: c.bg, borderColor: c.b}}>
      {label}
    </span>
  );
}

function SectionLabel({children}) {
  return <span className="section-label">{children}</span>;
}

function InfoBox({children, color}) {
  return (
    <div style={{background: color || "#f7f7f5", borderRadius: 8, padding: "11px 14px", fontSize: 13, lineHeight: 1.65}}>
      {children}
    </div>
  );
}

function SeverityCard({sev}) {
  return (
    <div style={{border: `1.5px solid ${sev.border}`, borderRadius: 9, padding: "12px 14px", background: sev.bg}}>
      <span style={{fontWeight: 700, fontSize: 13, color: sev.color, display: "block", marginBottom: 5}}>
        {sev.level}: {sev.label}
      </span>
      <p style={{fontSize: 12, color: "#444", lineHeight: 1.65, margin: 0}}>{sev.desc}</p>
    </div>
  );
}

function ComplianceBanner({hits}) {
  return (
    <div style={{background: "#fff5f0", border: "1.5px solid #F09595", borderRadius: 8, padding: "10px 14px", display: "flex", gap: 10, alignItems: "flex-start"}}>
      <span style={{fontSize: 16, flexShrink: 0}}>⚠</span>
      <div>
        <p style={{fontWeight: 700, fontSize: 12, color: "#A32D2D", marginBottom: 3}}>Compliance / Regulatory Risk Flagged</p>
        <p style={{fontSize: 12, color: "#7a2020", lineHeight: 1.6, margin: 0}}>
          This report contains language associated with potentially unlawful or non-compliant agent behavior ({hits.slice(0,3).map(h => `"${h}"`).join(", ")}). Review carefully before routing. Loop in your compliance or legal team as appropriate, regardless of final severity level.
        </p>
      </div>
    </div>
  );
}

/* ─── MAIN APP ──────────────────────────────────────────────────── */

function App() {
  const [view, setView]           = useState("submit");
  const [form, setForm]           = useState({text: "", customer: "", callId: "", when: "", impact: "Single caller", testReportId: null});
  const [result, setResult]       = useState(null);
  const [override, setOverride]   = useState({bucket: "STT", severity: "Sev2", note: ""});
  const [overrideMode, setOM]     = useState(false);
  const [overrideError, setOE]    = useState(false);
  const [confirmed, setConfirmed] = useState(false);
  const [queue, setQueue]         = useState([]);
  const [submissionSeq, setSeq]   = useState(0);
  const [filters, setFilters]     = useState({bucket: "All", severity: "All", status: "All"});
  const [selected, setSelected]   = useState(null);

  const runTriage = () => {
    if (!form.text.trim()) return;
    const r = scoreReport(form.text, form.impact);
    setResult(r);
    setOverride({bucket: r.primary, severity: r.severity.level, note: ""});
    setOM(false); setOE(false); setConfirmed(false);
  };

  const confirmRoute = () => {
    if (!result) return;
    if (overrideMode && !override.note.trim()) { setOE(true); return; }
    const fb = overrideMode ? override.bucket : result.primary;
    const fs = overrideMode ? override.severity : result.severity.level;
    const nextSeq = submissionSeq + 1;
    setSeq(nextSeq);
    const queueLabel = form.testReportId ? `Test #${form.testReportId}` : `Custom #${nextSeq}`;
    setQueue(q => [{
      id: Date.now(), ...form, result,
      finalBucket: fb, finalSev: fs,
      overrideNote: overrideMode ? override.note : "",
      status: "New",
      timestamp: new Date().toLocaleString(),
      queueLabel
    }, ...q]);
    setConfirmed(true);
    setForm({text: "", customer: "", callId: "", when: "", impact: "Single caller"});
    setResult(null);
  };

  const loadTest = r => {
    setForm({text: r.text, customer: r.customer, callId: "", when: "", impact: r.impact, testReportId: r.id});
    setResult(null); setConfirmed(false); setView("submit");
  };

  const SEV_ORDER = {Sev0: 0, Sev1: 1, Sev2: 2, Sev3: 3};

  const filtered = queue
    .filter(it => {
      if (filters.bucket !== "All" && it.finalBucket !== filters.bucket) return false;
      if (filters.severity !== "All" && it.finalSev !== filters.severity) return false;
      if (filters.status !== "All" && it.status !== filters.status) return false;
      return true;
    })
    .sort((a, b) => {
      const sevDiff = (SEV_ORDER[a.finalSev] ?? 4) - (SEV_ORDER[b.finalSev] ?? 4);
      if (sevDiff !== 0) return sevDiff;
      return b.id - a.id; // newest first within same severity
    });

  const nav = (id, label) => (
    <button key={id} onClick={() => setView(id)} style={{
      padding: "9px 18px", border: "none",
      borderBottom: view === id ? "2px solid #185FA5" : "2px solid transparent",
      background: "none", cursor: "pointer", fontSize: 13,
      fontWeight: view === id ? 600 : 400,
      color: view === id ? "#185FA5" : "#777", borderRadius: 0
    }}>{label}</button>
  );

  /* ── SUBMIT VIEW ── */
  const submitView = () => {
    const r = result;
    const bc = r ? BKT_COLOR[r.primary] : null;
    const sc = r ? {t: r.severity.color, bg: r.severity.bg, b: r.severity.border} : null;
    const confColor = !r ? "#888" : r.confidence === "High" ? "#3B6D11" : r.confidence === "Med" ? "#854F0B" : "#A32D2D";

    return (
      <div>
        <p style={{fontSize: 12, color: "#888", marginBottom: 6, fontWeight: 500}}>Quick-select test reports:</p>
        <div style={{display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 18}}>
          {TEST.map(t => (

        <p style={{marginBottom: 8}}>Severity is derived from keyword signals combined with the reporter-provided impact level. Outage biases toward Sev0, Many callers toward Sev1, and Single caller biases down from Sev1. Intermittent duplicate transaction logging is a special case: it is held at Sev2 unless there is evidence of broader financial impact, because the issue is data integrity rather than a broken user experience. The system always shows the full scoring rationale so a human reviewer can understand and challenge the decision.</p>

          "Weighted TF-IDF scoring across keywords. Rejected in favor of a simpler per-bucket additive score that is more transparent and interpretable by non-technical CS reviewers.",
          "Auto-routing without human confirmation. Rejected. Directly conflicts with the non-negotiable requirement that classification be a recommendation requiring explicit human sign-off.",
          "Fully AI-only classification with no rules layer. Rejected. The brief explicitly requires a rules backstop so the system does not rely on a model 'just knowing.'",
          "Automatic Sev0 for all compliance-flagged reports. Rejected. A single isolated non-compliant statement is serious but not a systemic outage. The severity rubric needs to distinguish between the two, and the rationale needs to explain it.",
          "Unnecessary UI redesign passes that added visual complexity without improving operational value.",
          "Additional infrastructure such as a backend, persistent database, or user authentication. Rejected as out of scope for a CS triage prototype that needs to run as a single downloadable file.",
          "Further UI redesign after the second QA pass. The internal-tool layout was already clear and functional. Additional visual changes would have added complexity without improving the reviewer experience.",
          "Production infrastructure such as database persistence, live AI APIs, or user authentication. These would increase deployment complexity and maintenance burden without improving the core case-study objective, which is operational judgment and auditability."
        ]
      }
    ];

    return (
      <div style={{maxWidth: 700}}>
        <div style={{marginBottom: 20, paddingBottom: 14, borderBottom: "1px solid #e8e8e5", display: "flex", gap: 32}}>
          <div>
            <p style={{fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", color: "#999", marginBottom: 2}}>Project Author</p>
            <p style={{fontSize: 13, fontWeight: 600, color: "#333"}}>Esther Ajari</p>
          </div>
          <div>
            <p style={{fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", color: "#999", marginBottom: 2}}>Vibe-Coding Tool</p>
            <p style={{fontSize: 13, fontWeight: 600, color: "#333"}}>Claude Code</p>
          </div>
        </div>
        <h2 style={{fontSize: 17, fontWeight: 700, marginBottom: 4}}>AI Usage Log</h2>
        <p style={{fontSize: 12, color: "#888", marginBottom: 22}}>Claude Code used as vibe-coding tool. This log covers what was generated, what was reviewed and refined, and what was considered and rejected.</p>
        {sections.map(sec => (
          <div key={sec.heading} style={{marginBottom: 24}}>
            <div style={{display: "flex", alignItems: "center", gap: 8, marginBottom: 12}}>
              <div style={{width: 26, height: 26, borderRadius: 6, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, background: sec.bg, color: sec.color}}>{sec.icon}</div>
              <p style={{fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", color: sec.color, margin: 0}}>{sec.heading}</p>
            </div>
            <div style={{display: "flex", flexDirection: "column", gap: 0}}>
              {sec.entries.map((text, i) => (
                <div key={i} style={{display: "flex", gap: 10, paddingBottom: 10, marginBottom: 10, borderBottom: "1px solid #eee"}}>
                  <span style={{flexShrink: 0, fontSize: 11, color: sec.color, fontWeight: 700, marginTop: 1}}>{i + 1}.</span>
                  <p style={{margin: 0, fontSize: 13, lineHeight: 1.65, color: "#333"}}>{text}</p>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    );
  };

  /* ── RENDER ── */
  return (
    <div style={{minHeight: "100vh", background: "#f4f3f0"}}>
      <div style={{maxWidth: 900, margin: "0 auto", padding: "24px 20px 80px"}}>
        <div style={{display: "flex", alignItems: "center", gap: 10, marginBottom: 20}}>
          <div style={{width: 32, height: 32, borderRadius: 8, background: "#185FA5", display: "flex", alignItems: "center", justifyContent: "center"}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.95 10.93 19.79 19.79 0 01.88 2.18 2 2 0 012.86 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L7.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92v2z"/>
            </svg>
          </div>
          <div>
            <div style={{fontWeight: 700, fontSize: 18}}>Bug Triage Console</div>
            <div style={{fontSize: 11, color: "#888"}}>Founder's Office Case Study Submission by Esther Ajari</div>
          </div>
        </div>

        <div style={{borderBottom: "1px solid #ddd", marginBottom: 24, display: "flex"}}>
          {nav("submit", "Submit Report")}
          {nav("queue", `Triage Queue (${queue.length})`)}
          {nav("writeup", "System Writeup")}
          {nav("log", "AI Usage Log")}
        </div>

        {view === "submit"  && submitView()}
        {view === "queue"   && queueView()}
        {view === "writeup" && writeupView()}
        {view === "log"     && logView()}

        {/* Footer */}
        <div style={{marginTop: 48, paddingTop: 16, borderTop: "1px solid #e0deda", textAlign: "center", fontSize: 11, color: "#aaa"}}>
          Prepared by Esther Ajari &nbsp;|&nbsp; Built using Claude Code &nbsp;|&nbsp; Founder's Office Case Study Submission
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
