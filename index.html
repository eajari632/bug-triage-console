function Badge({label, c, small}) {
  return (
    <span className="inline-tag" style={{fontSize: small ? 10 : 11, color: c.t, background: c.bg, borderColor: c.b}}>
      {label}
    </span>
  );
}

function SectionLabel({children}) {
  return <span className="section-label">{children}</span>;
}

function InfoBox({children, color}) {
  return (
    <div style={{background: color || "#f7f7f5", borderRadius: 8, padding: "11px 14px", fontSize: 13, lineHeight: 1.65}}>
      {children}
    </div>
  );
}

function SeverityCard({sev}) {
  return (
    <div style={{border: `1.5px solid ${sev.border}`, borderRadius: 9, padding: "12px 14px", background: sev.bg}}>
      <span style={{fontWeight: 700, fontSize: 13, color: sev.color, display: "block", marginBottom: 5}}>
        {sev.level}: {sev.label}
      </span>
      <p style={{fontSize: 12, color: "#444", lineHeight: 1.65, margin: 0}}>{sev.desc}</p>
    </div>
  );
}

function ComplianceBanner({hits}) {
  return (
    <div style={{background: "#fff5f0", border: "1.5px solid #F09595", borderRadius: 8, padding: "10px 14px", display: "flex", gap: 10, alignItems: "flex-start"}}>
      <span style={{fontSize: 16, flexShrink: 0}}>⚠</span>
      <div>
        <p style={{fontWeight: 700, fontSize: 12, color: "#A32D2D", marginBottom: 3}}>Compliance / Regulatory Risk Flagged</p>
        <p style={{fontSize: 12, color: "#7a2020", lineHeight: 1.6, margin: 0}}>
          This report contains language associated with potentially unlawful or non-compliant agent behavior ({hits.slice(0,3).map(h => `"${h}"`).join(", ")}). Review carefully before routing. Loop in your compliance or legal team as appropriate, regardless of final severity level.
        </p>
      </div>
    </div>
  );
}

/* ─── MAIN APP ──────────────────────────────────────────────────── */

function App() {
  const [view, setView]           = useState("submit");
  const [form, setForm]           = useState({text: "", customer: "", callId: "", when: "", impact: "Single caller", testReportId: null});
  const [result, setResult]       = useState(null);
  const [override, setOverride]   = useState({bucket: "STT", severity: "Sev2", note: ""});
  const [overrideMode, setOM]     = useState(false);
  const [overrideError, setOE]    = useState(false);
  const [confirmed, setConfirmed] = useState(false);
  const [queue, setQueue]         = useState([]);
  const [submissionSeq, setSeq]   = useState(0);
  const [filters, setFilters]     = useState({primary: "All", secondary: "All", severity: "All", status: "All", specialStatus: "All"});
  const [selected, setSelected]   = useState(new Set());

  const runTriage = () => {
    if (!form.text.trim()) return;
    const r = scoreReport(form.text, form.impact);
    setResult(r);
    setOverride({bucket: r.primary, severity: r.severity.level, note: ""});
    setOM(false); setOE(false); setConfirmed(false);
  };

  const confirmRoute = () => {
    if (!result) return;
    if (overrideMode && !override.note.trim()) { setOE(true); return; }
    const fb = overrideMode ? override.bucket : result.primary;
    const fs = overrideMode ? override.severity : result.severity.level;

    // Build override change summary
    let overrideChangeSummary = "";
    let finalSevRationale = result.sevRationale;
    if (overrideMode) {
      const bucketChanged = override.bucket !== result.primary;
      const sevChanged = override.severity !== result.severity.level;
      const lines = [];
      if (bucketChanged) lines.push(`Bucket changed from ${result.primary} to ${override.bucket}.`);
      if (sevChanged) lines.push(`Severity changed from ${result.severity.level} to ${override.severity}.`);
      overrideChangeSummary = lines.join("\n");

      // Structured severity rationale when severity was overridden
      if (sevChanged) {
        finalSevRationale =
          `Original system rationale:\n${result.sevRationale}\n\n` +
          `Human override:\nSeverity changed from ${result.severity.level} to ${override.severity}.\n\n` +
          `Override rationale:\n${override.note}`;
      }
    }

    const nextSeq = submissionSeq + 1;
    setSeq(nextSeq);
    const queueLabel = form.testReportId ? `Test #${form.testReportId}` : `Custom #${nextSeq}`;
    setQueue(q => [{
      id: Date.now(), ...form, result,
      finalBucket: fb, finalSev: fs,
      overrideChangeSummary,
      finalSevRationale,
      status: "New",
      timestamp: new Date().toLocaleString(),
      queueLabel
    }, ...q]);
    setConfirmed(true);
    setForm({text: "", customer: "", callId: "", when: "", impact: "Single caller"});
    setResult(null);
  };

  // Auto-detect impact level from report text.
  // Outage-level signals take priority; plural scope signals default to Many callers;
  // singular/isolated signals default to Single caller.
  const autoDetectImpact = text => {
    const lo = text.toLowerCase();
    const outageSignals = ["outage","all calls are","no calls","system down","all customers","widespread failure",
      "cannot place","cannot receive calls","all outbound","all inbound","nothing is working","service is down",
      "carrier connect rate dropped","dropped to near zero","complete failure","service unavailable",
      "every request failing","all requests failing","every call failing","all calls failing"];
    // Shared infrastructure failures imply broad scope even without customer-count language.
    // A failing shared endpoint, API, or service affects all callers using it.
    const sharedInfraSignals = ["500 error","503 error","server error","endpoint error","webhook fail",
      "webhook is failing","nothing is saving","requests are failing","api failure","api is down",
      "database fail","storage fail","auth fail","rate limit","recordings unavailable","recordings are unavailable",
      "crm updates","summaries not saving","duplicate transaction","duplicate event","idempotency",
      "nothing saves","data is not saving","nothing is being saved"];
    const pluralSignals = ["calls","callers","customers","users","accounts","events","transactions",
      "payments","recordings","summaries","notes","webhooks","attempts","reports","agents","conversations",
      "people","parties","incidents","cases","tickets",
      "on long calls","multiple calls","several customers","some users","customers report","callers say",
      "payments are","recordings are","events are","attempts show","call ids","call transcripts"];
    const singularSignals = ["one customer","one caller","a single call","this call","one account",
      "a single user","single call","isolated case","one instance","single caller","one user"];
    if (outageSignals.some(s => lo.includes(s))) return "Outage";
    if (sharedInfraSignals.some(s => lo.includes(s))) return "Many callers";
    if (singularSignals.some(s => lo.includes(s))) return "Single caller";
    if (pluralSignals.some(s => lo.includes(s))) return "Many callers";
    return "Single caller";
  };

  const loadTest = r => {
    setForm({text: r.text, customer: r.customer, callId: "", when: "", impact: autoDetectImpact(r.text), testReportId: r.id});
    setResult(null); setConfirmed(false); setView("submit");
  };

  const SEV_ORDER = {Sev0: 0, Sev1: 1, Sev2: 2, Sev3: 3};

  const filtered = queue
    .filter(it => {
      if (filters.primary !== "All" && it.finalBucket !== filters.primary) return false;
      if (filters.secondary !== "All" && !it.result.allSecondaries.includes(filters.secondary)) return false;
      if (filters.severity !== "All" && it.finalSev !== filters.severity) return false;
      if (filters.status !== "All" && it.status !== filters.status) return false;
      if (filters.specialStatus === "Regular cases" && (it.overrideChangeSummary || it.result.complianceRisk)) return false;
      if (filters.specialStatus === "Overridden cases" && !it.overrideChangeSummary) return false;
      if (filters.specialStatus === "Compliance cases" && !it.result.complianceRisk) return false;
      return true;
    })
    .sort((a, b) => {
      const sevDiff = (SEV_ORDER[a.finalSev] ?? 4) - (SEV_ORDER[b.finalSev] ?? 4);
      if (sevDiff !== 0) return sevDiff;
      return b.id - a.id; // newest first within same severity
    });

  const nav = (id, label) => (
    <button key={id} onClick={() => setView(id)} style={{
      padding: "9px 18px", border: "none",
      borderBottom: view === id ? "2px solid #185FA5" : "2px solid transparent",
      background: "none", cursor: "pointer", fontSize: 13,
      fontWeight: view === id ? 600 : 400,
      color: view === id ? "#185FA5" : "#777", borderRadius: 0
    }}>{label}</button>
  );

  /* ── SUBMIT VIEW ── */
  const submitView = () => {
    const r = result;
    const bc = r ? BKT_COLOR[r.primary] : null;
    const sc = r ? {t: r.severity.color, bg: r.severity.bg, b: r.severity.border} : null;
    const confColor = !r ? "#888" : r.confidence === "High" ? "#3B6D11" : r.confidence === "Med" ? "#854F0B" : "#A32D2D";

    return (
      <div>
        <p style={{fontSize: 12, color: "#888", marginBottom: 6, fontWeight: 500}}>Quick-select test reports:</p>
        <div style={{display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 18}}>
          {TEST.map(t => (
            <button key={t.id} onClick={() => loadTest(t)} style={{fontSize: 12, padding: "3px 10px", border: "1px solid #ccc", borderRadius: 5, background: "#fff", color: "#555"}}>{t.id}</button>
          ))}
        </div>

        <div style={{display: "flex", flexDirection: "column", gap: 12}}>
          <div>
            <label style={{fontSize: 12, fontWeight: 600, display: "block", marginBottom: 4}}>Bug report *</label>
            <textarea rows={4} value={form.text} onChange={e => setForm(f => ({...f, text: e.target.value, impact: autoDetectImpact(e.target.value), testReportId: null}))} placeholder="Paste the customer bug report here..." style={{width: "100%"}} />
          </div>
          <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10}}>
            <div>
              <label style={{fontSize: 12, fontWeight: 600, display: "block", marginBottom: 3}}>Customer</label>
              <input value={form.customer} onChange={e => setForm(f => ({...f, customer: e.target.value}))} placeholder="Customer name" />
            </div>
            <div>
              <label style={{fontSize: 12, fontWeight: 600, display: "block", marginBottom: 3}}>Call ID (optional)</label>
              <input value={form.callId} onChange={e => setForm(f => ({...f, callId: e.target.value}))} placeholder="call_xxx" />
            </div>
            <div>
              <label style={{fontSize: 12, fontWeight: 600, display: "block", marginBottom: 3}}>When did it start?</label>
              <input value={form.when} onChange={e => setForm(f => ({...f, when: e.target.value}))} placeholder="e.g. Yesterday 3pm" />
            </div>
            <div>
              <label style={{fontSize: 12, fontWeight: 600, display: "block", marginBottom: 3}}>Impact</label>
              <select value={form.impact} onChange={e => setForm(f => ({...f, impact: e.target.value}))}>
                <option>Single caller</option><option>Many callers</option><option>Outage</option>
              </select>
            </div>
          </div>
          <button onClick={runTriage} style={{alignSelf: "flex-start", padding: "9px 22px", background: "#185FA5", color: "#fff", border: "none", borderRadius: 7, fontSize: 13, fontWeight: 600}}>Run Triage</button>
        </div>

        {r && !confirmed && (
          <div style={{marginTop: 22, border: "1px solid #ddd", borderRadius: 10, overflow: "hidden", background: "#fff"}}>
            <div style={{background: "#f5f3ec", padding: "10px 16px", borderBottom: "1px solid #e8e8e5", display: "flex", justifyContent: "space-between", alignItems: "center"}}>
              <span style={{fontWeight: 700, fontSize: 13}}>Triage Result: Recommendation Only</span>
              <span style={{fontSize: 11, color: "#888", fontStyle: "italic"}}>Human review required before routing</span>
            </div>

            <div style={{padding: 16, display: "flex", flexDirection: "column", gap: 16}}>

              {/* Compliance banner (shown first if flagged) */}
              {r.complianceRisk && <ComplianceBanner hits={r.complianceHits} />}

              {/* 1. Classification */}
              <div>
                <SectionLabel>Classification</SectionLabel>
                <div style={{display: "flex", flexDirection: "column", gap: 6}}>
                  <div style={{display: "flex", alignItems: "center", gap: 8}}>
                    <span style={{fontSize: 11, color: "#888", minWidth: 110}}>Primary Bucket:</span>
                    <Badge label={BUCKET_RULES.find(b => b.id === r.primary).label} c={bc} />
                  </div>
                  <div style={{display: "flex", alignItems: "center", gap: 8}}>
                    <span style={{fontSize: 11, color: "#888", minWidth: 110}}>Secondary Bucket:</span>
                    {r.allSecondaries.length > 0
                      ? r.allSecondaries.map(sid => <Badge key={sid} label={BUCKET_RULES.find(b => b.id === sid).label} c={BKT_COLOR[sid] || {t:"#5F5E5A",bg:"#F1EFE8",b:"#B4B2A9"}} />)
                      : <span style={{fontSize: 11, color: "#bbb", fontStyle: "italic"}}>None</span>
                    }
                  </div>
                </div>
              </div>

              {/* 2. Classification Evidence */}
              <div>
                <SectionLabel>Classification Evidence</SectionLabel>
                <div style={{display: "flex", flexDirection: "column", gap: 6}}>
                  <div>
                    <span style={{fontSize: 11, color: "#888"}}>Primary bucket evidence: </span>
                    {r.primary === "LLM" ? (
                      r.llmFailureLabels && r.llmFailureLabels.length > 0
                        ? <div style={{display: "flex", flexDirection: "column", gap: 3, marginTop: 4}}>
                            {r.llmFailureLabels.map((label, i) => (
                              <span key={i} style={{fontSize: 11, background: "#FBEAF0", color: "#993556", padding: "2px 8px", borderRadius: 4, border: "1px solid #ED93B1", display: "inline-block", width: "fit-content"}}>{label}</span>
                            ))}
                          </div>
                        : <span style={{fontSize: 11, color: "#A32D2D", fontStyle: "italic"}}>No keyword matches. Do not route without manual review.</span>
                    ) : (
                      [...new Set(r.evidence)].length
                        ? [...new Set(r.evidence)].map((e, i) => <code key={i} style={{fontSize: 11, background: "#FAEEDA", color: "#854F0B", padding: "2px 7px", borderRadius: 4, border: "1px solid #FAC775", marginRight: 4}}>"{e}"</code>)
                        : <span style={{fontSize: 11, color: "#A32D2D", fontStyle: "italic"}}>No keyword matches. Do not route without manual review.</span>
                    )}
                  </div>
                  {r.allSecondaries.length > 0 && (
                    <div>
                      <span style={{fontSize: 11, color: "#888"}}>Secondary bucket evidence: </span>
                      {r.allSecondaries.map(sid => {
                        const evList = (r.allEvidence[sid] || []).filter(k => k).slice(0, 3);
                        return evList.length
                          ? evList.map((e, i) => <code key={`${sid}-${i}`} style={{fontSize: 11, background: "#F1EFE8", color: "#5F5E5A", padding: "2px 7px", borderRadius: 4, border: "1px solid #B4B2A9", marginRight: 4}}>"{e}"</code>)
                          : <span key={sid} style={{fontSize: 11, color: "#bbb", fontStyle: "italic"}}>No additional keyword matches</span>;
                      })}
                    </div>
                  )}
                </div>
              </div>

              {/* 3. Severity */}
              <div>
                <SectionLabel>Severity</SectionLabel>
                <div style={{display: "flex", alignItems: "center", gap: 8, marginBottom: 8}}>
                  <Badge label={`${r.severity.level}: ${r.severity.label}`} c={sc} />
                </div>
                <SectionLabel>Severity Evidence</SectionLabel>
                <div style={{display: "flex", flexWrap: "wrap", gap: 4}}>
                  {r.sevEvidence.length === 0 && (!r.sevLimitingEvidence || r.sevLimitingEvidence.length === 0) && (
                    <span style={{fontSize: 11, color: "#888", fontStyle: "italic"}}>No severity evidence detected.</span>
                  )}
                  {r.sevEvidence.map((e, i) => (
                    <code key={`esc-${i}`} style={{fontSize: 11, background: "#EAF3DE", color: "#3B6D11", padding: "2px 7px", borderRadius: 4, border: "1px solid #C0DD97"}}>"{e}"</code>
                  ))}
                  {r.sevLimitingEvidence && r.sevLimitingEvidence.map((e, i) => (
                    <code key={`lim-${i}`} style={{fontSize: 11, background: "#F1EFE8", color: "#5F5E5A", padding: "2px 7px", borderRadius: 4, border: "1px solid #B4B2A9"}}>{e}</code>
                  ))}
                </div>
              </div>

              {/* 4. Confidence */}
              <div>
                <SectionLabel>Confidence</SectionLabel>
                <InfoBox color={r.confidence === "Low" ? "#fff5f5" : "#f7f7f5"}>
                  {(() => {
                    const lvlColor = lv => lv === "High" ? "#3B6D11" : lv === "Med" ? "#854F0B" : "#A32D2D";
                    const lvlBg   = lv => lv === "High" ? "#EAF3DE" : lv === "Med" ? "#FAEEDA" : "#FCEBEB";
                    const lvlBdr  = lv => lv === "High" ? "#C0DD97" : lv === "Med" ? "#FAC775" : "#F09595";
                    const lvlLabel = lv => lv === "Med" ? "MEDIUM" : lv.toUpperCase();
                    const bLv = r.confRationale.bucketLevel || r.confidence;
                    const sLv = r.confRationale.severityLevel || r.confidence;
                    const Badge = ({lv}) => (
                      <span style={{display:"inline-block", fontSize:11, fontWeight:700, padding:"2px 8px", borderRadius:4,
                        border:`1px solid ${lvlBdr(lv)}`, color:lvlColor(lv), background:lvlBg(lv),
                        letterSpacing:".06em", marginBottom:4}}>
                        {lvlLabel(lv)}
                      </span>
                    );
                    return (
                      <div style={{display:"flex", flexDirection:"column", gap:10}}>
                        <div>
                          <span style={{fontSize:11, fontWeight:700, color:"#888", textTransform:"uppercase", letterSpacing:".05em", display:"block", marginBottom:4}}>Bucket Confidence</span>
                          <Badge lv={bLv} />
                          <p style={{fontSize:12, color:"#444", margin:"4px 0 0", lineHeight:1.6}}>{r.confRationale.bucket}</p>
                        </div>
                        <div style={{borderTop:"1px solid #e8e8e5", paddingTop:10}}>
                          <span style={{fontSize:11, fontWeight:700, color:"#888", textTransform:"uppercase", letterSpacing:".05em", display:"block", marginBottom:4}}>Severity Confidence</span>
                          <Badge lv={sLv} />
                          <p style={{fontSize:12, color:"#444", margin:"4px 0 0", lineHeight:1.6}}>{r.confRationale.severity}</p>
                        </div>
                        <div style={{borderTop:"1px solid #e8e8e5", paddingTop:10}}>
                          <span style={{fontSize:11, fontWeight:700, color:lvlColor(r.confidence), textTransform:"uppercase", letterSpacing:".05em", display:"block", marginBottom:4}}>Overall Confidence</span>
                          <Badge lv={r.confidence} />
                          <p style={{fontSize:12, color:"#444", margin:"4px 0 0", lineHeight:1.6}}>{r.confRationale.overall.replace(/^(High|Medium|Low) confidence\. /, "")}</p>
                        </div>
                      </div>
                    );
                  })()}
                </InfoBox>
              </div>

              {/* 5. Routing */}
              <div>
                <SectionLabel>Routing suggestion</SectionLabel>
                <InfoBox>
                  <p style={{fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", color: "#999", marginBottom: 4}}>Primary route</p>
                  <p style={{fontWeight: 600, marginBottom: r.allSecondaries.length ? 10 : 12}}>{r.routing.team}</p>
                  {r.allSecondaries.length > 0 && (
                    <div style={{marginBottom: 12, paddingTop: 10, borderTop: "1px solid #e8e8e5"}}>
                      <p style={{fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", color: "#999", marginBottom: 4}}>Secondary review</p>
                      {r.allSecondaries.map(sid => {
                        const sr = ROUTING[sid];
                        return sr ? (
                          <p key={sid} style={{fontWeight: 600, marginBottom: 4}}>{sr.team}</p>
                        ) : null;
                      })}
                    </div>
                  )}
                  <SectionLabel>Key information to share with primary team</SectionLabel>
                  <ol style={{margin: 0, paddingLeft: 18}}>
                    {r.primary !== "INFRA" && (
                      <li style={{fontSize: 12, marginBottom: 3}}>
                        {r.primary === "LLM"
                          ? (form.impact === "Single caller"
                              ? "Full call transcript or Call ID, including the customer intent that was mishandled and the agent's response"
                              : "Three to five Call IDs or transcripts that reproduce the issue, with the customer intent that was mishandled noted for each")
                          : (form.impact === "Single caller"
                              ? "Full call transcript or Call ID where the issue occurred"
                              : "Three to five Call IDs or transcripts that reproduce the issue")
                        }
                      </li>
                    )}
                    {r.routing.qs
                      .filter(q => {
                        const lo = q.toLowerCase();
                        const scopeQ = lo.includes("one customer account or multiple") || lo.includes("one customer or multiple");
                        const otherCallersQ = lo.includes("other callers") || lo.includes("similar language background") ||
                          lo.includes("occurred on other calls") || lo.includes("appears isolated");
                        // Suppress scope-confirmation questions when impact already establishes scope
                        if (scopeQ && form.impact === "Single caller") return false;
                        if (scopeQ && (form.impact === "Many callers" || form.impact === "Outage")) return false;
                        // Suppress "other callers" questions when impact already confirms multiple callers
                        if (otherCallersQ && (form.impact === "Many callers" || form.impact === "Outage")) return false;
                        // Suppress customer account questions for single caller (already identified via call ID)
                        if (form.impact === "Single caller" && (lo.includes("customer account") || lo.includes("multiple customers"))) return false;
                        return true;
                      })
                      .map((q, i) => <li key={i} style={{fontSize: 12, marginBottom: 3}}>{q}</li>)}
                  </ol>
                  {r.allSecondaries.length > 0 && r.allSecondaries.map(sid => {
                    const sr = ROUTING[sid];
                    if (!sr) return null;
                    return (
                      <div key={sid} style={{marginTop: 12, paddingTop: 12, borderTop: "1px solid #e8e8e5"}}>
                        <SectionLabel>Key information to share with secondary team</SectionLabel>
                        <ol style={{margin: 0, paddingLeft: 18}}>
                          {sid !== "INFRA" && (
                            <li style={{fontSize: 12, marginBottom: 3}}>{form.impact === "Single caller" ? "Full call transcript or Call ID where the issue occurred" : "Three to five Call IDs or transcripts that reproduce the issue"}</li>
                          )}
                          {sr.qs.slice(0, 3)
                            .filter(q => {
                              const lo = q.toLowerCase();
                              const scopeQ = lo.includes("one customer account or multiple") || lo.includes("one customer or multiple");
                              const otherCallersQ = lo.includes("other callers") || lo.includes("similar language background") ||
                                lo.includes("occurred on other calls") || lo.includes("appears isolated");
                              if (scopeQ && form.impact === "Single caller") return false;
                              if (scopeQ && (form.impact === "Many callers" || form.impact === "Outage")) return false;
                              if (otherCallersQ && (form.impact === "Many callers" || form.impact === "Outage")) return false;
                              if (form.impact === "Single caller" && (lo.includes("customer account") || lo.includes("multiple customers"))) return false;
                              return true;
                            })
                            .map((q, i) => <li key={i} style={{fontSize: 12, marginBottom: 3}}>{q}</li>)}
                        </ol>
                      </div>
                    );
                  })}
                </InfoBox>
              </div>

              {/* Human Override */}
              <div style={{border: "1px dashed #ccc", borderRadius: 8, padding: "12px 14px"}}>
                <div style={{display: "flex", alignItems: "center", gap: 8, marginBottom: overrideMode ? 12 : 0}}>
                  <input type="checkbox" id="ov" checked={overrideMode} onChange={e => {setOM(e.target.checked); setOE(false);}} />
                  <label htmlFor="ov" style={{fontSize: 13, fontWeight: 500, cursor: "pointer"}}>Human Override: change bucket or severity</label>
                </div>
                {overrideMode && (
                  <div style={{display: "flex", flexDirection: "column", gap: 8}}>
                    <div style={{display: "flex", gap: 8}}>
                      <select value={override.bucket} onChange={e => setOverride(o => ({...o, bucket: e.target.value}))} style={{flex: 1}}>
                        {BUCKET_RULES.map(b => <option key={b.id} value={b.id}>{b.label}</option>)}
                      </select>
                      <select value={override.severity} onChange={e => setOverride(o => ({...o, severity: e.target.value}))} style={{flex: 1}}>
                        {SEV_RULES.map(s => <option key={s.level} value={s.level}>{s.level}: {s.label}</option>)}
                      </select>
                    </div>
                    <input
                      value={override.note}
                      onChange={e => {setOverride(o => ({...o, note: e.target.value})); setOE(false);}}
                      placeholder="Justification required. Why are you changing this? (e.g. 'Call recording confirms TTS, not STT')"
                      style={{borderColor: overrideError ? "#A32D2D" : "#ccc"}}
                    />
                    {overrideError && <p style={{fontSize: 12, color: "#A32D2D", margin: 0}}>A justification note is required before you can confirm this override.</p>}
                  </div>
                )}
              </div>

              <button onClick={confirmRoute} style={{alignSelf: "flex-start", padding: "9px 22px", background: "#0F6E56", color: "#fff", border: "none", borderRadius: 7, fontSize: 13, fontWeight: 600}}>
                Confirm and Route
              </button>
            </div>
          </div>
        )}

        {confirmed && (
          <div style={{marginTop: 18, padding: "12px 16px", background: "#EAF3DE", borderRadius: 7, border: "1px solid #C0DD97", color: "#27500A", fontWeight: 500, fontSize: 13}}>
            Report confirmed and added to triage queue.{" "}
            <button onClick={() => {setView("queue"); setConfirmed(false);}} style={{background: "none", border: "none", color: "#185FA5", cursor: "pointer", fontWeight: 600, padding: 0}}>View queue</button>
          </div>
        )}
      </div>
    );
  };

  /* ── QUEUE VIEW ── */
  const queueView = () => (
    <div id="queue-print-area">
      <div style={{display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap", alignItems: "center"}}>
        {[["primary", ["All", ...BUCKET_RULES.map(b => b.id)]], ["secondary", ["All", ...BUCKET_RULES.map(b => b.id)]], ["severity", ["All","Sev0","Sev1","Sev2","Sev3"]], ["status", ["All","New","In Review","Routed","Resolved"]]].map(([k, opts]) => (
          <div key={k} style={{display: "flex", alignItems: "center", gap: 5}}>
            <label style={{fontSize: 12, fontWeight: 500, color: "#888"}}>{k === "primary" ? "Primary Bucket:" : k === "secondary" ? "Secondary Bucket:" : k.charAt(0).toUpperCase() + k.slice(1) + ":"}</label>
            <select value={filters[k]} onChange={e => setFilters(f => ({...f, [k]: e.target.value}))} style={{width: "auto", padding: "4px 8px", fontSize: 12}}>
              {opts.map(o => <option key={o}>{o}</option>)}
            </select>
          </div>
        ))}
        <div style={{display: "flex", alignItems: "center", gap: 5}}>
          <label style={{fontSize: 12, fontWeight: 500, color: "#888"}}>Special Status:</label>
          <select value={filters.specialStatus} onChange={e => setFilters(f => ({...f, specialStatus: e.target.value}))} style={{width: "auto", padding: "4px 8px", fontSize: 12}}>
            <option>All</option>
            <option>Regular cases</option>
            <option>Overridden cases</option>
            <option>Compliance cases</option>
          </select>
        </div>
        <div style={{marginLeft: "auto", display: "flex", alignItems: "center", gap: 12}}>
          <span style={{fontSize: 11, color: "#aaa", fontStyle: "italic"}}>Sorted by severity, then newest first</span>
          <button
            onClick={() => setFilters({primary: "All", secondary: "All", severity: "All", status: "All", specialStatus: "All"})}
            style={{padding: "6px 14px", border: "1px solid #ccc", borderRadius: 6, background: "#fff", fontSize: 12, cursor: "pointer", color: "#555"}}>
            Reset Filters
          </button>
          <button
            onClick={() => exportCSV(queue)}
            disabled={queue.length === 0}
            style={{padding: "6px 14px", border: "1px solid #ccc", borderRadius: 6, background: queue.length === 0 ? "#f5f5f3" : "#fff", color: queue.length === 0 ? "#aaa" : "#1a1a1a", fontSize: 12, fontWeight: 500}}
          >
            Download CSV ({queue.length})
          </button>
        </div>
      </div>

      {!filtered.length ? (
        <div style={{textAlign: "center", padding: "48px 0", color: "#888", fontSize: 14}}>No reports yet. Submit a bug report to get started.</div>
      ) : (
        <div>
          <div className="queue-row queue-header" style={{display: "grid", gridTemplateColumns: "60px 1fr 90px 70px 70px 80px 110px", gap: 6, padding: "6px 10px", fontSize: 10, fontWeight: 700, color: "#888", textTransform: "uppercase", letterSpacing: ".06em", background: "#eeecea", borderRadius: 6, marginBottom: 4}}>
            <span>Ref</span><span>Report</span><span>Customer</span><span>Primary Bucket</span><span>Secondary Bucket</span><span>Severity</span><span>Status</span>
          </div>
          {filtered.map(item => {
            const bc = BKT_COLOR[item.finalBucket] || BKT_COLOR.INFRA;
            const sevRule = SEV_RULES.find(s => s.level === item.finalSev);
            const sc = {t: sevRule?.color || "#888", bg: sevRule?.bg || "#eee", b: sevRule?.border || "#ccc"};
            const isOpen = selected.has(item.id);
            return (
              <div key={item.id} style={{marginBottom: 4}}>
                <div onClick={() => setSelected(prev => { const next = new Set(prev); next.has(item.id) ? next.delete(item.id) : next.add(item.id); return next; })} className="queue-row" style={{display: "grid", gridTemplateColumns: "60px 1fr 90px 70px 70px 80px 110px", gap: 6, padding: "9px 10px", border: "1px solid #e8e8e5", borderRadius: isOpen ? "8px 8px 0 0" : "8px", cursor: "pointer", alignItems: "center", background: isOpen ? "#f0f6ff" : "#fff"}}>
                  <span style={{fontSize: 11, fontWeight: 600, color: "#534AB7", whiteSpace: "nowrap"}}>{item.queueLabel || ""}</span>
                  <span style={{overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", fontSize: 12}}>
                    {item.result.complianceRisk && <span style={{display: "inline-block", fontSize: 9, fontWeight: 700, padding: "1px 5px", borderRadius: 4, border: "1px solid #F09595", color: "#A32D2D", background: "#FCEBEB", marginRight: 5, verticalAlign: "middle", letterSpacing: ".03em"}}>Compliance Risk</span>}
                    {item.overrideChangeSummary && <span style={{display: "inline-block", fontSize: 9, fontWeight: 700, padding: "1px 5px", borderRadius: 4, border: "1px solid #AFA9EC", color: "#534AB7", background: "#EEEDFE", marginRight: 5, verticalAlign: "middle", letterSpacing: ".03em"}}>Overridden</span>}
                    {item.text}
                  </span>
                  <span style={{fontSize: 11, color: "#888"}}>{item.customer || ""}</span>
                  <Badge label={item.finalBucket} c={bc} small />
                  {item.result.allSecondaries.length > 0
                    ? <Badge label={item.result.allSecondaries[0]} c={BKT_COLOR[item.result.allSecondaries[0]] || {t:"#5F5E5A",bg:"#F1EFE8",b:"#B4B2A9"}} small />
                    : <span style={{fontSize: 10, color: "#ccc"}}>-</span>
                  }
                  <Badge label={item.finalSev} c={sc} small />
                  <select onClick={e => e.stopPropagation()} value={item.status} onChange={e => setQueue(q => q.map(it => it.id === item.id ? {...it, status: e.target.value} : it))} style={{fontSize: 11, padding: "3px 5px", width: "auto"}}>
                    {["New","In Review","Routed","Resolved"].map(s => <option key={s}>{s}</option>)}
                  </select>
                </div>
                {isOpen && (
                  <div style={{border: "1px solid #ddd", borderTop: "none", borderRadius: "0 0 8px 8px", padding: "14px", background: "#fafaf9", fontSize: 12, lineHeight: 1.75}}>
                    {item.result.complianceRisk && (
                      <p style={{marginBottom: 8, padding: "6px 10px", background: "#fff5f0", border: "1px solid #F09595", borderRadius: 6, color: "#A32D2D", fontWeight: 600}}>
                        Compliance / Regulatory Risk: {item.result.complianceHits.slice(0,3).map(h => `"${h}"`).join(", ")}
                      </p>
                    )}
                    <p style={{marginBottom: 6}}><strong>Full report:</strong> {item.text}</p>
                    <p style={{marginBottom: 8}}><strong>Customer:</strong> {item.customer || ""} &nbsp;|&nbsp; <strong>Call ID:</strong> {item.callId || ""} &nbsp;|&nbsp; <strong>Impact:</strong> {item.impact} &nbsp;|&nbsp; <strong>Logged:</strong> {item.timestamp}</p>

                    <p style={{marginBottom: 3}}><strong>Primary Bucket:</strong> {item.finalBucket}</p>
                    <p style={{marginBottom: 8}}><strong>Secondary Bucket:</strong> {item.result.allSecondaries.length > 0 ? item.result.allSecondaries.join(", ") : "None"}</p>

                    <p style={{marginBottom: 2}}><strong>Classification Evidence:</strong></p>
                    <p style={{marginBottom: 2, paddingLeft: 10}}>Primary: {
                      item.finalBucket === "LLM"
                        ? (item.result.llmFailureLabels && item.result.llmFailureLabels.length > 0
                            ? item.result.llmFailureLabels.join("; ")
                            : "No interpreted labels matched")
                        : (item.result.evidence.length ? item.result.evidence.map(e => `"${e}"`).join(", ") : "None")
                    }</p>
                    {item.result.allSecondaries.length > 0 && (
                      <p style={{marginBottom: 8, paddingLeft: 10}}>Secondary: {item.result.allSecondaries.flatMap(sid => (item.result.allEvidence[sid] || []).filter(k=>k).slice(0,3).map(k=>`"${k}"`)).join(", ") || "No additional keyword matches"}</p>
                    )}
                    {item.result.allSecondaries.length === 0 && <div style={{marginBottom: 8}} />}

                    <p style={{marginBottom: 3}}><strong>Severity:</strong> {item.finalSev}</p>
                    <p style={{marginBottom: 2}}><strong>Severity Evidence:</strong></p>
                    <p style={{marginBottom: 4, paddingLeft: 10}}>
                      {item.result.sevEvidence && item.result.sevEvidence.length > 0
                        ? item.result.sevEvidence.map(e => `"${e}"`).join(", ")
                        : "No severity keywords matched in report text."
                      }
                    </p>
                    <p style={{marginBottom: 8, paddingLeft: 10, fontSize: 11, color: "#555", lineHeight: 1.6}}>{item.finalSevRationale || item.result.sevRationale}</p>

                    <p style={{marginBottom: 2}}><strong>Confidence:</strong> <span style={{color: item.result.confidence === "High" ? "#3B6D11" : item.result.confidence === "Med" ? "#854F0B" : "#A32D2D", fontWeight: 600}}>{item.result.confidence === "Med" ? "Medium" : item.result.confidence}</span></p>
                    <p style={{marginBottom: 2, paddingLeft: 10, fontSize: 11, color: "#666"}}><em>Bucket:</em> <strong>{item.result.confRationale.bucketLevel === "Med" ? "Medium" : item.result.confRationale.bucketLevel}</strong>  :  {item.result.confRationale.bucket}</p>
                    <p style={{marginBottom: 2, paddingLeft: 10, fontSize: 11, color: "#666"}}><em>Severity:</em> <strong>{item.result.confRationale.severityLevel === "Med" ? "Medium" : item.result.confRationale.severityLevel}</strong>  :  {item.result.confRationale.severity}</p>
                    <p style={{marginBottom: 8, paddingLeft: 10, fontSize: 11, color: "#666"}}><em>Overall:</em> {item.result.confRationale.overall}</p>
                    <p style={{marginBottom: item.overrideChangeSummary ? 6 : 0}}><strong>Routed to:</strong> {item.result.routing.team}</p>
                    {item.overrideChangeSummary && (
                      <p style={{marginTop: 6, padding: "8px 10px", background: "#fff5f0", border: "1px solid #F09595", borderRadius: 6, color: "#A32D2D", whiteSpace: "pre-line"}}>
                        <strong>Override Change Summary:</strong>{"\n"}{item.overrideChangeSummary}
                      </p>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  /* ── WRITEUP VIEW ── */
  const writeupView = () => (
    <div id="writeup-print-area" style={{maxWidth: 740}}>
      <div style={{marginBottom: 14, paddingBottom: 10, borderBottom: "1px solid #e8e8e5"}}>
        <p className="writeup-title" style={{fontSize: 48, fontWeight: 700, color: "#1a1a1a", marginBottom: 4, lineHeight: 1, letterSpacing: "-.03em"}}>Bug Triage Console</p>
        <p style={{fontSize: 15, color: "#555", fontWeight: 600, marginBottom: 1}}>Prepared by Esther Ajari</p>
        <p style={{fontSize: 13, color: "#999", marginBottom: 0}}>Founder's Office Case Study Submission</p>
      </div>

      <h3 className="writeup-heading">Bucket Definitions</h3>
      <div className="bucket-grid" style={{marginBottom: 18}}>
        {BUCKET_RULES.map(b => (
          <div key={b.id} style={{marginBottom: 10, paddingLeft: 10, borderLeft: `3px solid ${BKT_COLOR[b.id].b}`}}>
            <p style={{fontWeight: 600, fontSize: 13, marginBottom: 2}}>{b.label}</p>
            <p style={{fontSize: 12, color: "#555"}}>{b.why}</p>
          </div>
        ))}
      </div>

      <h3 className="writeup-heading">Severity Rubric</h3>
      <div className="sev-grid" style={{marginBottom: 18, display: "flex", flexDirection: "column", gap: 8}}>
        {SEV_RULES.map(s => <SeverityCard key={s.level} sev={s} />)}
      </div>
      <div style={{marginBottom: 18, paddingLeft: 10, borderLeft: "3px solid #e8e8e5"}}>
        <p style={{fontSize: 12, color: "#555", lineHeight: 1.7}}>
          Severity decisions are based on both escalating and limiting signals found in the report. Escalating signals include broad customer impact, blocked workflows, financial harm, and legal or compliance risk. Limiting signals include intermittent behavior, cosmetic or internal-only impact, and cases where the primary customer workflow still succeeds. The Severity Evidence section shows both types. The final severity reflects the balance between them.
        </p>
      </div>

      <h3 className="writeup-heading">Compliance and Regulatory Risk</h3>
      <div style={{marginBottom: 18, paddingLeft: 10, borderLeft: "3px solid #F09595"}}>
        <p style={{fontSize: 12, color: "#555", lineHeight: 1.7, marginBottom: 6}}>
          Reports that contain language associated with unlawful or non-compliant agent behavior are flagged with a compliance risk banner before any other output. The system uses phrase-level matching to avoid false positives from partial word matches.
        </p>
        <p style={{fontSize: 12, color: "#555", lineHeight: 1.7, marginBottom: 6}}>
          Compliance risk raises the severity recommendation: isolated incidents are treated as Sev1 and broad or systemic failures are treated as Sev0. The rationale always explains why, and a note to involve legal or compliance review is included regardless of the final severity level.
        </p>
        <p style={{fontSize: 12, color: "#555", lineHeight: 1.7}}>
          Compliance-sensitive language can support both the bucket classification and the severity assessment as separate decisions. For example, a threat of arrest may indicate an LLM reasoning failure for classification purposes and also raise a compliance severity signal. These are evaluated independently.
        </p>
      </div>

      <h3 className="writeup-heading">Routing Philosophy</h3>
      <div style={{marginBottom: 18, fontSize: 13, lineHeight: 1.75, color: "#333"}}>
        <p style={{marginBottom: 8}}>Each report is scored across the five buckets. The highest-scoring bucket becomes the primary owner. Secondary buckets are assigned when a second ownership path has meaningful evidence , not arbitrarily. A multilingual call may involve both a transcription failure (STT) and a language routing failure (LLM). A duplicate transaction may involve both Infrastructure and Post-call Process. When a secondary bucket is present, the routing section shows both teams with separate escalation checklists.</p>

        <p style={{marginBottom: 8}}>Secondary buckets do not automatically reduce confidence. If the primary bucket clearly leads and the secondary reflects a downstream consequence rather than a competing explanation, confidence stays High. Confidence drops to Medium when ownership is genuinely ambiguous.</p>

        <p style={{marginBottom: 8}}>Classification Evidence and Severity Evidence are kept separate on purpose. Classification Evidence answers why the report belongs to a given bucket. Severity Evidence answers why it deserves a particular urgency level. For LLM reports, classification evidence uses interpreted failure categories , such as "Wrong account reasoning" or "Repeated reasoning loop" , so reviewers see the type of failure, not just matched phrases.</p>

        <p style={{marginBottom: 8}}>Confidence is shown in three parts. Bucket Confidence reflects certainty in ownership. Severity Confidence reflects certainty in urgency and scope. Overall Confidence is the lower of the two , a strong bucket classification does not mask uncertain severity.</p>

        <p>Every classification is a recommendation. A reviewer confirms and routes each report before it enters the queue. Any change requires a written justification, which is recorded alongside the original recommendation and included in the CSV export. The audit trail is permanent. The Key Information checklists are written for CS reviewers, not engineers , they ask for call IDs, observed behavior, and time windows, not configuration or deployment details.</p>
      </div>

      <h3 className="writeup-heading">Limitations</h3>
      <div style={{marginBottom: 18, fontSize: 13, lineHeight: 1.75, color: "#333"}}>
        <p style={{marginBottom: 10}}>Classification is rule-based rather than learned from historical data. The system cannot improve its routing recommendations from resolved tickets over time, and impact estimates are based on report content and reviewer input rather than live error rates or affected customer counts.</p>
        <p>Future versions could learn from reviewer decisions and integrate with ticketing and observability systems to improve both routing accuracy and confidence calibration over time.</p>
      </div>
    </div>
  );

  /* ── AI LOG VIEW ── */
  const logView = () => {
    const sections = [
      {
        heading: "Used AI for",
        color: "#185FA5", bg: "#E6F1FB", icon: "✦",
        entries: [
          "Initial prototype: the full working application was generated in one pass, including the report form, queue, triage result view, CSV export, and first-draft documentation.",
          "Rules engine: bucket scoring logic, severity signal detection, and initial confidence level assignment were generated and then refined through human review.",
          "Routing framework: team assignments and context-aware information checklists per bucket were generated as a starting point and then edited for accuracy."
        ]
      },
      {
        heading: "Changed manually after review",
        color: "#3B6D11", bg: "#EAF3DE", icon: "✎",
        entries: [
          "Compliance logic: narrowed to genuine legal and regulatory language only, with phrase-level matching to prevent false positives. Added two-tier severity escalation that distinguishes isolated incidents from systemic failures.",
          "Secondary bucket logic: added rules for cross-cutting reports. Multilingual calls add LLM as a secondary to STT; duplicate payment events add Infrastructure as a secondary to Post-call. Secondary buckets surface separate team routing and information checklists.",
          "Evidence model: Classification Evidence and Severity Evidence were separated into distinct sections. LLM classification uses plain-language failure descriptions instead of matched phrases. Severity evidence now prioritizes business-impact signals over generic matched verbs.",
          "Confidence model: expanded to three labeled dimensions shown as HIGH, MEDIUM, or LOW badges. Bucket Confidence covers ownership certainty, Severity Confidence covers scope and urgency certainty, and Overall Confidence is the weaker of the two. Includes rules for reports where severity is inferred rather than directly stated.",
          "Override auditability and QA: mandatory written justification on every override, structured audit trail in the queue and CSV, compliance-risk and override badges on queue rows, and multi-row expansion for side-by-side comparison."
        ]
      },
      {
        heading: "Rejected",
        color: "#A32D2D", bg: "#FCEBEB", icon: "✗",
        entries: [
          "Fully autonomous routing without human confirmation. Every triage result is a recommendation that requires a reviewer to confirm before anything is queued.",
          "A black-box classifier with no explainable output. The brief requires the system to show why it made a decision, not just what it decided."
        ]
      }
    ];

    return (
    <div id="log-print-area" style={{maxWidth: 700}}>
        <div style={{marginBottom: 20, paddingBottom: 14, borderBottom: "1px solid #e8e8e5", display: "flex", gap: 32}}>
          <div>
            <p style={{fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", color: "#999", marginBottom: 2}}>Project Author</p>
            <p style={{fontSize: 13, fontWeight: 600, color: "#333"}}>Esther Ajari</p>
          </div>
          <div>
            <p style={{fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", color: "#999", marginBottom: 2}}>Vibe-Coding Tool</p>
            <p style={{fontSize: 13, fontWeight: 600, color: "#333"}}>Claude Code</p>
          </div>
        </div>
        {sections.map(sec => (
          <div key={sec.heading} style={{marginBottom: 24}}>
            <div style={{display: "flex", alignItems: "center", gap: 8, marginBottom: 12}}>
              <div style={{width: 26, height: 26, borderRadius: 6, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, background: sec.bg, color: sec.color}}>{sec.icon}</div>
              <p className="log-section-heading" style={{fontSize: 17, fontWeight: 700, color: "#1a1a1a", letterSpacing: "-.01em", margin: 0}}>{sec.heading}</p>
            </div>
            <div style={{display: "flex", flexDirection: "column", gap: 0}}>
              {sec.entries.map((text, i) => (
                <div key={i} style={{display: "flex", gap: 10, paddingBottom: 10, marginBottom: 10, borderBottom: "1px solid #eee"}}>
                  <span style={{flexShrink: 0, fontSize: 11, color: sec.color, fontWeight: 700, marginTop: 1}}>{i + 1}.</span>
                  <p style={{margin: 0, fontSize: 13, lineHeight: 1.65, color: "#333"}}>{text}</p>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    );
  };

  /* ── RENDER ── */
  return (
    <div data-view={view} style={{minHeight: "100vh", background: "#f4f3f0"}}>
      <div style={{maxWidth: 900, margin: "0 auto", padding: "24px 20px 80px"}}>
        <div style={{display: "flex", alignItems: "center", gap: 10, marginBottom: 20}}>
          <div style={{width: 32, height: 32, borderRadius: 8, background: "#185FA5", display: "flex", alignItems: "center", justifyContent: "center"}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.95 10.93 19.79 19.79 0 01.88 2.18 2 2 0 012.86 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L7.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92v2z"/>
            </svg>
          </div>
          <div>
            <div style={{fontWeight: 700, fontSize: 18}}>Bug Triage Console</div>
            <div style={{fontSize: 11, color: "#888"}}>Founder's Office Case Study Submission by Esther Ajari</div>
          </div>
        </div>

        <div style={{borderBottom: "1px solid #ddd", marginBottom: 24, display: "flex"}}>
          {nav("submit", "Submit Report")}
          {nav("queue", `Triage Queue (${queue.length})`)}
          {nav("writeup", "System Writeup")}
          {nav("log", "AI Usage Log")}
        </div>

        {view === "submit"  && submitView()}
        {view === "queue"   && queueView()}
        {view === "writeup" && writeupView()}
        {view === "log"     && logView()}

        {/* Footer */}
        <div style={{marginTop: 48, paddingTop: 16, borderTop: "1px solid #e0deda", textAlign: "center", fontSize: 11, color: "#aaa"}}>
          Prepared by Esther Ajari &nbsp;|&nbsp; Built using Claude Code &nbsp;|&nbsp; Founder's Office Case Study Submission
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
