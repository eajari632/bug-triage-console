const BUCKET_RULES = [
  {
    id: "STT", label: "STT (Speech-to-Text)",

// Compliance/regulatory risk signals used for severity escalation
// Compliance signals: only language that raises genuine legal, regulatory, or policy concerns.
// Operational workflow terms (collections, escalation, routing) are intentionally excluded.
const COMPLIANCE_SIGNALS = [
  "arrested","arrest","jail","prison",
  "unlawful","illegal","lawsuit","sue","sued","suing",
  "court","threatening","threatened","threaten","coerce","coerced","coercion",
  "harassment","harass","harassing","abusive",
  "prohibited","policy violation","regulatory violation",
  "deceptive","false statement","non-compliant"

const SEV_RULES = [
  {
    level: "Sev0", label: "Stop-ship / Outage",
    color: "#A32D2D", bg: "#FCEBEB", border: "#F09595",
    desc: "Agent cannot place or receive calls, widespread failures affecting all or most customers, critical data not being saved, or a compliance-impacting systemic issue. Requires immediate escalation and an active incident bridge.",

      "can't understand","cannot understand","can't hear","cannot hear","can't complete","cannot complete","won't stop","does not stop","can't receive","cannot receive calls",
      "amounts","balance","payment amount","debt amount","settlement amount",
      "refuses to proceed","outdated payment information","payment method update","unable to update","blocked from","payment blocked","transaction blocked",

  },
  {

    color: "#3B6D11", bg: "#EAF3DE", border: "#C0DD97",
    desc: "Intermittent or limited-scope issue affecting a subset of calls. A workaround may exist. Impacts some customers but the system remains broadly functional. Target fix within 2 to 3 business days.",
    keywords: ["sometimes","intermittent","subset","long calls","certain","occasional","8-12 seconds"],
    impactBoost: {"Single caller": -1}
  },
  {
    level: "Sev3", label: "Minor",
    color: "#534AB7", bg: "#EEEDFE", border: "#AFA9EC",
    desc: "Cosmetic issue, edge-case confusion, or low-frequency problem with minimal customer impact. Does not materially affect call outcomes. Fix in next sprint.",
    keywords: ["cosmetic","minor","edge case","low impact","one hundred twenty","number pronunciation","reads the amount as"]
  }
];

const BKT_COLOR = {
  STT:      {t:"#185FA5", bg:"#E6F1FB", b:"#85B7EB"},
  TTS:      {t:"#0F6E56", bg:"#E1F5EE", b:"#5DCAA5"},
  LLM:      {t:"#993556", bg:"#FBEAF0", b:"#ED93B1"},
  POST_CALL:{t:"#854F0B", bg:"#FAEEDA", b:"#EF9F27"},
  INFRA:    {t:"#3C3489", bg:"#EEEDFE", b:"#7F77DD"}
};

const ROUTING = {
  STT: {
    team: "Voice AI (STT)",
    qs: [
      "Language or accent of the affected caller",
      "Whether the issue is consistent or occurs only sometimes",
      "Whether the misrecognition occurs on the same word or phrase repeatedly or varies across calls",
      "Whether other callers with a similar accent have reported the same issue"
    ]
  },
  TTS: {
    team: "Voice AI (TTS)",
    qs: [
      "Whether the issue occurs on every call or only on specific phrases",
      "Whether the issue affects all configured voices or only a specific voice",
      "Customer's description of what they heard versus what they expected",
      "Approximate time window when the issue was first noticed"
    ]
  },
  LLM: {
    team: "Voice AI (LLM / Prompt)",
    qs: [
      "Any account-specific circumstances not already visible in the transcript",
      "Exact timestamp of the agent's incorrect response within the call, if known",
      "Whether the customer attempted to correct the agent and how the agent responded",

    ]
  },
  POST_CALL: {
    team: "Integrations",
    qs: [
      "Whether this affects all calls or only calls for a specific customer or workflow",
      "Whether the missing data (notes, summaries, CRM updates) was ever present or never appeared",

      "Any visible error message shown to the reviewer or in the CRM interface"
    ]
  },
  INFRA: {
    team: "Platform / Infra",
    qs: [
      "Affected time window and whether the issue is still ongoing",
      "Approximate number of affected events, requests, or records",
      "Any error message visible to the reviewer or reported by the customer",
      "Whether the issue appeared suddenly or gradually worsened"
    ]
  }
};

const TEST = [
  {id:1,  text:"Agent keeps hearing 'yes' as 'no' and sends people to collections escalation incorrectly.",                              customer:"Acme Collections",  impact:"Many callers"},
  {id:2,  text:"Customers say the voice sounds robotic and garbled, and they can't understand amounts.",                                  customer:"FinanceOne",        impact:"Many callers"},
  {id:3,  text:"Agent told a customer they're going to be arrested if they don't pay today.",                                             customer:"DebtCo",           impact:"Single caller"},
  {id:4,  text:"Calls connect, but after the call we don't see notes in Salesforce and no summary is written.",                          customer:"SalesForce Inc",    impact:"Many callers"},
  {id:5,  text:"We're getting 500 errors on the /webhook/call-ended endpoint; nothing is saving.",                                        customer:"WebhookCorp",      impact:"Outage"},
  {id:6,  text:"Agent repeats the same question in a loop even after the customer answers.",                                              customer:"LoopTech",         impact:"Many callers"},
  {id:7,  text:"Audio is fine, but the transcript shows [inaudible] for half the call.",                                                  customer:"TranCorp",         impact:"Many callers"},
  {id:8,  text:"The agent voice cuts off mid-sentence when the customer interrupts. Barge-in seems broken.",                             customer:"VoicePlus",        impact:"Many callers"},
  {id:9,  text:"Outbound attempts show 'dialed' but the customer never receives a ring. Carrier connect rate dropped to near zero.",      customer:"DialMax",          impact:"Outage"},
  {id:10, text:"Agent misunderstands Spanish callers; keeps responding in English even when they ask '¿Habla español?'",                 customer:"Multilingual LLC",  impact:"Many callers"},
  {id:11, text:"After successful payments, the system sometimes double-logs the payment event (duplicate transaction IDs).",             customer:"PaySafe",          impact:"Many callers"},
  {id:12, text:"On long calls, the voice response starts taking 8-12 seconds to speak back.",                                            customer:"LongCall Co",      impact:"Single caller"},
  {id:13, text:"Customer says they already paid; agent still insists they haven't and won't check. Bad account lookup/tool use.",        customer:"ResolveNow",       impact:"Single caller"},
  {id:14, text:"We can't retrieve recordings for yesterday. Storage shows 'file not found' for many call IDs.",                          customer:"RecordVault",      impact:"Many callers"},
  {id:15, text:"Agent reads the amount as 'one hundred twenty' when it should be 'one thousand twenty'. Number pronunciation is wrong.", customer:"NumericAI",         impact:"Single caller"}
];

/* ─── SCORING ENGINE ────────────────────────────────────────────── */

function scoreReport(text, impact) {
  const lower = text.toLowerCase();

  // Per-bucket keyword scoring
  const scores = {}, evidenceMap = {};
  for (const b of BUCKET_RULES) {
    let s = 0, hits = [];
    for (const k of b.keywords) {
      if (lower.includes(k.toLowerCase())) { s++; hits.push(k); }
    }
    scores[b.id] = s;
    evidenceMap[b.id] = hits;
  }

  // Multilingual edge case: if STT wins and LLM also has signal for language routing,
  // force LLM as a secondary tag with an explanatory note
  const isMultilingual = lower.includes("spanish") || lower.includes("habla") ||
    lower.includes("misunderstands spanish") || lower.includes("responding in english");
  if (isMultilingual && scores["STT"] >= scores["LLM"]) {
    // Ensure LLM appears as secondary even if it scored 0
    scores["LLM"] = Math.max(scores["LLM"], 0.5);
  }

  // Duplicate payment event injection: dup transaction / double-log reports primarily concern
  // idempotency and platform reliability (INFRA), but are often observed through post-call
  // workflows (POST_CALL). INFRA is primary; POST_CALL added as secondary.
  const isDupPaymentReport = (lower.includes("duplicate transaction") || lower.includes("double-log") ||
    lower.includes("double logs") || lower.includes("payment event") || lower.includes("duplicate event") ||
    lower.includes("idempotency") || lower.includes("duplicate record") || lower.includes("duplicate write")) &&
    !["database failure","storage failure","queue failure","retry storm","event bus","service outage","outage"].some(s => lower.includes(s));
  if (isDupPaymentReport && scores["INFRA"] >= scores["POST_CALL"]) {
    scores["POST_CALL"] = Math.max(scores["POST_CALL"], 0.5);
  }

  // Loop-after-answer injection: when LLM is primary and the report describes a loop that
  // occurs after the customer has already answered, add STT as secondary.
  // Reason: if the transcript is not capturing the customer's response correctly, the agent
  // may behave as if the customer never answered , making STT a plausible contributing cause.
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const primary = sorted[0][0];
  const topScore = sorted[0][1];
  let allSecondaries = sorted.filter(([id, s]) => id !== primary && s > 0).map(([id]) => id);

  // Loop-after-answer injection: when LLM is primary and the report describes a loop that
  // continues after the customer has already answered, add STT as secondary.
  const LOOP_AFTER_ANSWER_SIGNALS = [
    "even after the customer answers","even after the customer responded","after the customer answers",
    "after customer answers","customer already answered","customer answered but","customer responds but",
    "customer said yes but","keeps asking after","does not recognize",
    "agent does not recognize","ignores the response","ignores caller response"
  ];
  const transcriptConfirmedAccurate = lower.includes("transcript is accurate") ||
    lower.includes("transcript shows correctly") || lower.includes("transcript is correct");
  const isLoopAfterAnswer = (lower.includes("loop") || lower.includes("repeats the same") ||
    lower.includes("looping") || lower.includes("same question")) &&
    LOOP_AFTER_ANSWER_SIGNALS.some(s => lower.includes(s)) &&
    !transcriptConfirmedAccurate;
  if (isLoopAfterAnswer && primary === "LLM") {
    scores["STT"] = Math.max(scores["STT"], 0.5);
    // Re-sort to ensure allSecondaries reflects the injection
    const resort = Object.entries(scores).sort((a, b) => b[1] - a[1]);
    allSecondaries.length = 0;
    resort.filter(([id, s]) => id !== primary && s > 0).forEach(([id]) => allSecondaries.push(id));
  }

  // Confidence with rationale
  // Step 1: base confidence from primary keyword count, with LLM uplift from interpreted evidence.
  // For LLM reports, raw keyword count often undersells confidence because the failure
  // categories (Wrong account reasoning, Unsupported refusal, etc.) are broader semantic
  // patterns than single keywords. When interpreted categories fire, treat that as strong evidence.
  let confidence, confBucketRationale;
  const effectiveScore = Math.floor(topScore);

  // Pre-compute interpreted LLM evidence strength for use in Step 1
  const llmInterpretedCount = primary === "LLM"
    ? LLM_FAILURE_CATEGORIES.filter(cat => cat.signals.some(s => lower.includes(s.toLowerCase()))).length
    : 0;
  const llmStrongInterpreted = llmInterpretedCount >= 2;
  const llmModerateInterpreted = llmInterpretedCount === 1;

  if (primary === "LLM" && llmStrongInterpreted) {
    // Multiple interpreted failure categories fired , strong ownership signal regardless of raw count
    confidence = "High";
    const catNames = LLM_FAILURE_CATEGORIES
      .filter(cat => cat.signals.some(s => lower.includes(s.toLowerCase())))
      .map(cat => cat.label)
      .slice(0, 3);
    confBucketRationale = `Multiple independent LLM failure signals support the same ownership decision. Alternative bucket explanations are weak.`;
  } else if (primary === "LLM" && llmModerateInterpreted) {
    // One interpreted category , if raw keyword score also supports it, upgrade to High
    const catNames = LLM_FAILURE_CATEGORIES
      .filter(cat => cat.signals.some(s => lower.includes(s.toLowerCase())))
      .map(cat => cat.label);
    if (effectiveScore >= 2) {
      confidence = "High";
      confBucketRationale = `A clear LLM failure pattern is present and supported by keyword evidence. Strong enough to route with confidence.`;
    } else {
      confidence = "Med";
      confBucketRationale = `One LLM failure pattern detected. Classification is plausible but thin. Confirm with call transcript.`;
    }
  } else if (effectiveScore >= 3) {
    confidence = "High";
    const topEvidence = (evidenceMap[primary] || []).slice(0,2).map(k => `"${k}"`).join(", ");
    confBucketRationale = topEvidence
      ? `The evidence (${topEvidence}) points clearly to ${primary} as the owner. No competing bucket explanations were found.`
      : `Multiple signals point to ${primary}. No competing bucket explanations of similar strength.`;
  } else if (effectiveScore === 2) {
    confidence = "High";
    const topEvidence2 = (evidenceMap[primary] || []).slice(0,2).map(k => `"${k}"`).join(", ");
    confBucketRationale = topEvidence2
      ? `The report contains clear ${primary} signals (${topEvidence2}). Sufficient to classify with confidence; confirm with a call recording before routing.`
      : `Sufficient evidence to classify ${primary} with confidence. Confirm with a call recording before routing.`;
  } else if (effectiveScore === 1) {
    confidence = "Med";
    confBucketRationale = `Only 1 keyword matched for ${primary}. Classification is plausible but thin. A human reviewer should sanity-check before confirming.`;
  } else {
    confidence = "Low";
    confBucketRationale = `No keyword matches found for any bucket. The report language may be too vague or novel. Human judgment required. Do not route without manual review.`;
  }

  // Step 2: calibrate confidence based on secondary evidence quality.
  const meaningfulSecondaries = allSecondaries.filter(sid => Math.floor(scores[sid]) >= 1);

  const STT_PERCEPTION_SIGNALS = ["'yes' as 'no'","yes as no","hears","mishear","misheard","inaudible","transcript","diarization","partial transcript"];
  const isLLMDownstreamOfSTT = primary === "STT" && meaningfulSecondaries.includes("LLM") &&
    evidenceMap["STT"].some(k => STT_PERCEPTION_SIGNALS.includes(k.toLowerCase()));

  if (isLoopAfterAnswer && primary === "LLM") {
    confidence = "Med";
    confBucketRationale = `LLM is the likely primary owner because the agent is repeating the same question. STT is included as secondary because if the customer's response is not captured correctly by speech recognition, the agent may behave as if no answer was given. Ownership depends on whether the transcript is accurate.`;
  } else if (isMultilingual && primary === "STT") {
    confidence = "Med";
    confBucketRationale = `STT has the strongest signal, but LLM evidence is also present due to a language routing failure. STT owns the transcription gap, but the agent's choice to respond in English may also reflect a prompt-level language routing issue. Ownership is shared.`;
  } else if (isDupPaymentReport && primary === "INFRA") {
    confidence = "Med";
    confBucketRationale = `Infrastructure has the strongest signal because duplicate transaction IDs, double-logged events, and idempotency failures are platform-level concerns. Post-call Process is flagged as secondary because the symptom is often observed through post-call workflows. Ownership is split.`;
  } else if (isLLMDownstreamOfSTT) {
    const secLabels = meaningfulSecondaries.join(", ");
    confBucketRationale = `${primary} has the clearest primary signal: the report describes a specific speech recognition error. ${secLabels} is included as secondary because the downstream behavior (such as incorrect escalation) may follow from the misrecognition, not from an independent LLM failure.`;
  } else if (meaningfulSecondaries.length > 0) {
    const topSecScore = Math.floor(scores[meaningfulSecondaries[0]]);
    const primaryScore = Math.floor(scores[primary]);
    const gap = primaryScore - topSecScore;
    const secLabels = meaningfulSecondaries.join(", ");
    if (gap > 2) {
      confBucketRationale = `${primary} has the clearest primary signal (${primaryScore} keyword matches vs ${topSecScore} for ${secLabels}). ${secLabels} is noted as secondary but is unlikely to be the root cause.`;
    } else {
      confidence = "Med";
      confBucketRationale = `${primary} has the strongest signal, but ${secLabels} evidence is also present and close in strength. Ownership is genuinely ambiguous , both buckets could plausibly be the root cause.`;
    }
  } else if (allSecondaries.length > 0) {
    confBucketRationale += ` Note: secondary signal also detected for ${allSecondaries.join(", ")}. This may be a cross-cutting issue.`;
  }

  // Compliance risk detection
  // Whole-word compliance matching to avoid false positives from substrings
  // (e.g. "sue" inside "issue", "court" inside "discount", "jail" inside "email").
  // Multi-word phrases are matched with word boundaries at the phrase edges only.
  const matchesComplianceSignal = (text, signal) => {
    const escaped = signal.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const pattern = new RegExp('\\b' + escaped + '\\b', 'i');
    return pattern.test(text);
  };
  const complianceHits = COMPLIANCE_SIGNALS.filter(k => matchesComplianceSignal(lower, k));
  const hasComplianceRisk = complianceHits.length > 0;

  // Severity scoring
  // SEV_SCORE_ONLY: contribute to severity scoring but are too generic to display as evidence
  const SEV_SCORE_ONLY = new Set([
    "keeps","always","won't stop","does not stop","double-log","certain",
    "agent continues","keeps repeating","keeps insisting","insists the old","old card","old account",
    "incorrect payment","wrong payment","unable to update","payment method update"
  ]);

  // SEV_LIMITING_SIGNALS: these are genuine severity evidence that push severity DOWN.
  // They should be displayed as limiting evidence, not hidden.
  const SEV_LIMITING_SIGNALS = [
    {phrase: "sometimes",       label: "sometimes (intermittent)"},
    {phrase: "occasional",      label: "occasional (intermittent)"},
    {phrase: "intermittent",    label: "intermittent"},
    {phrase: "subset",          label: "subset of calls (partial scope)"},
    {phrase: "edge case",       label: "edge case"},
    {phrase: "low impact",      label: "low impact stated"},
    {phrase: "cosmetic",        label: "cosmetic issue"},
    {phrase: "minor",           label: "minor impact stated"},
    {phrase: "long calls",      label: "long calls only (specific condition)"},
    {phrase: "customer workflow succeeds", label: "customer workflow succeeds"},
    {phrase: "successfully processed", label: "transaction succeeded"},
    {phrase: "successful payment",     label: "payment succeeded"},
    {phrase: "after successful",       label: "payment succeeded"},
    {phrase: "payment succeeds",       label: "payment succeeded"},
  ];

  let sevScore = [0, 0, 0, 0], sevEvidence = [], sevLimitingEvidence = [];
  for (let i = 0; i < SEV_RULES.length; i++) {
    const r = SEV_RULES[i];
    for (const k of r.keywords) {
      if (lower.includes(k.toLowerCase())) {
        sevScore[i] += 2;
        // Display if not score-only
        if (!SEV_SCORE_ONLY.has(k)) sevEvidence.push(k);
      }
    }
    if (r.impactBoost && r.impactBoost[impact]) sevScore[i] += r.impactBoost[impact];
  }
  // Collect limiting evidence from the report text
  for (const {phrase, label} of SEV_LIMITING_SIGNALS) {
    if (lower.includes(phrase)) {
      sevLimitingEvidence.push(label);
    }
  }
  // Deduplicate limiting evidence (e.g. multiple "payment succeeded" variants)
  const seenLimiting = new Set();
  const dedupedLimiting = sevLimitingEvidence.filter(l => {
    const key = l.split(" ")[0];
    if (seenLimiting.has(key)) return false;
    seenLimiting.add(key);
    return true;
  });
  sevLimitingEvidence = dedupedLimiting;
  // Cross-dedup: if a phrase already captured as limiting also leaked into sevEvidence
  // (e.g. "sometimes" scoring as Sev2 keyword), remove it from sevEvidence.
  // The limiting interpretation is more accurate.
  const limitingPhrases = new Set(SEV_LIMITING_SIGNALS.map(s => s.phrase));
  sevEvidence = sevEvidence.filter(k => !limitingPhrases.has(k.toLowerCase()));
  // Add a business-impact severity signal based on bucket + impact, rather than echoing the
  // dropdown value. This explains WHY the scope matters for this type of failure.
  if (impact && impact !== "Single caller") {
    const impactLabel = (() => {
      if (impact === "Outage") return "Service is unavailable , all customers are affected.";
      // Many callers , generate bucket-specific business-impact language
      const bucketImpact = {
        STT: "Speech recognition failures affect multiple callers, leading to miscommunication or incorrect outcomes.",
        TTS: "Voice quality or speech issues affect multiple callers, impairing their ability to understand the agent.",
        LLM: "Incorrect agent reasoning or output affects multiple customer interactions.",
        POST_CALL: "Post-call workflow failures affect multiple calls, impacting operational records or follow-up processes.",
        INFRA: "Platform-level failures affect multiple calls or services."
      };
      return bucketImpact[primary] || `Broad impact reported across multiple callers.`;
    })();
    sevEvidence.push(impactLabel);
  }

  // Compliance escalation: boost Sev1 by 1 if compliance risk is present but not already Sev0.
  // We do NOT auto-promote all compliance issues to Sev0 because some (e.g. a single isolated
  // threatening statement) are serious but not systemic outages. Sev0 is reserved for systemic
  // or widespread compliance failures. A single incident with compliance risk lands at Sev1
  // and the rationale explains why.
  if (hasComplianceRisk) {
    sevScore[1] += 3; // strong push toward Sev1
    // Add compliance signals to sevEvidence so they appear in the Severity Evidence section
    complianceHits.forEach(h => { if (!sevEvidence.includes(h)) sevEvidence.push(h); });
  }

  let si = sevScore.indexOf(Math.max(...sevScore));
  if (Math.max(...sevScore) === 0) si = 2;

  // Duplicate-transaction special case: limited/intermittent scope = Sev2.
  // Escalate to Sev1 only when there is evidence of broader impact or financial harm.
  // Duplicate transaction / payment event severity rule:
  // Sev3 when payment succeeded and issue is only duplicate logging with no customer harm.
  // Escalate to Sev2+ only when harm, financial loss, or reconciliation failure is stated.
  const isDuplicateTransaction = lower.includes("duplicate transaction") || lower.includes("double-log") ||
    lower.includes("double logs") || lower.includes("payment event") || lower.includes("duplicate event") ||
    lower.includes("idempotency") || lower.includes("duplicate record");
  if (isDuplicateTransaction) {
    const harmSignals = ["failed payment","payment failed","lost money","incorrect balance","wrong balance",
      "financial reconciliation","customers charged twice","duplicate charges","charged twice","missing payment",
      "reporting failure","widespread","systemic","all payments"];
    const paymentSucceeded = lower.includes("successful payment") || lower.includes("after successful") ||
      lower.includes("payment succeeds") || lower.includes("payment was successful") ||
      lower.includes("successfully processed");
    const hasHarm = harmSignals.some(s => lower.includes(s));
    const isLoggingOnly = !hasHarm && (paymentSucceeded || lower.includes("double-log") ||
      lower.includes("double logs") || lower.includes("duplicate record") ||
      lower.includes("duplicate transaction id") || lower.includes("duplicate transaction ids"));
    if (isLoggingOnly) {
      si = 3; // Sev3: logging-only issue, payment succeeded, no customer harm
    } else if (!hasHarm) {
      si = 2; // Sev2: dup transaction without confirmed harm
    }
  }

  // Loop-after-answer severity rule: a repeated loop is disruptive but single-caller scope
  // does not justify Sev1 unless there is compliance risk, outage, or broad impact.
  if (isLoopAfterAnswer && si === 1 && impact === "Single caller" && !hasComplianceRisk) {
    si = 2;
  }

  // General unconfirmed-scope rule: when the only path to Sev1 is the impact dropdown
  // and the report text contains no scope-confirming language, hold at Sev2.
  // Rationale: the reporter may have selected "Many callers" by default or as a best guess.
  // The report text is the more reliable signal. If the text does not say "all calls",
  // "many customers", "keeps happening", etc., the scope is unconfirmed and Sev2 is safer.
  // This applies across all buckets, not just POST_CALL.
  const scopeConfirmingSignals = [
    "many callers","all calls","every call","always","keeps","every customer",
    "widespread","most calls","multiple customers","all customers","consistently",
    "all users","100%","across all","many call ids","many call id","customers report","users report"
  ];
  const textConfirmsScope = scopeConfirmingSignals.some(s => lower.includes(s));
  const onlyImpactBoostDrivesS1 = si === 1 && !sevEvidence.length && !textConfirmsScope && impact === "Many callers" && !hasComplianceRisk;
  if (onlyImpactBoostDrivesS1) {
    si = 2; // Hold at Sev2: scope is unconfirmed by report text
  }

  const severity = SEV_RULES[si];

  // Plural-scope language: words that suggest more than one caller but do not confirm
  // how many. These rule out Sev3 (clearly not a single isolated case) but do not
  // justify Sev1 (no qualifying adjective like "all", "many", "widespread").
  const pluralScopeSignals = [
    "calls","callers","customers","users","agents","people","clients","parties"
  ];
  const textHasPluralScope = pluralScopeSignals.some(s => {
    // Match as a whole word to avoid partial matches (e.g. "call" inside "called")
    return new RegExp(`\\b${s}\\b`, "i").test(lower);
  });

  let sevRationale;
  if (hasComplianceRisk) {
    const sevLabel = SEV_RULES[si].level;
    const complianceList = complianceHits.slice(0, 2).map(h => `"${h}"`).join(", ");
    if (impact === "Single caller") {
      sevRationale = `This report affects a single caller, which would normally support a lower severity. However, the content contains language associated with legal or compliance risk (${complianceList}). ${sevLabel} is recommended because the compliance exposure is meaningful regardless of scope. A single instance of threatening or unlawful agent behavior can carry regulatory consequences. Loop in legal or compliance review.`;
    } else {
      sevRationale = `Compliance or regulatory risk detected (matched: ${complianceList}). Impact reported as "${impact}". ${sevLabel}: the combination of broad scope and compliance risk warrants immediate escalation. Loop in legal or compliance review.`;
    }
  } else if (onlyImpactBoostDrivesS1) {
    sevRationale = `Classified Sev2 (Moderate). The impact dropdown was set to "Many callers" but the report text does not contain language that confirms broad scope (such as "all calls", "every customer", or "widespread"). Severity has been held at Sev2 because the scope is unconfirmed by the report itself. Escalate to Sev1 if broad impact is verified.`;
  } else if (isDuplicateTransaction) {
    if (si === 3) {
      sevRationale = `Classified Sev3 (Minor). The payment appears to have succeeded and the issue is limited to duplicate logging or duplicate records. No customer harm, financial loss, or reconciliation failure is stated. Escalate if any of those are confirmed.`;
    } else {
      sevRationale = `Classified Sev2 (Moderate). Duplicate transaction or event logging detected. No explicit customer harm stated but scope is unclear. Verify whether financial reconciliation or customer records are affected.`;
    }
  } else if (sevEvidence.length) {
    // Evidence found in report text. Lead with what the report says, not what the dropdown says.
    const evList = sevEvidence.slice(0,3).map(k => `"${k}"`).join(", ");
    if (textHasPluralScope && !textConfirmsScope) {
      const pluralHits = pluralScopeSignals.filter(s => new RegExp(`\\b${s}\\b`, "i").test(lower));
      sevRationale = `Severity evidence is present. However, scope is not fully confirmed: the report uses plural language ("${pluralHits.slice(0,2).join('", "')}"), which confirms more than one caller is affected but does not indicate how many. Verify actual scope before escalating.`;
    } else if (textConfirmsScope) {
      sevRationale = `Severity evidence is present and scope-confirming language is also in the report. Verify the full extent of impact before routing.`;
    } else {
      sevRationale = `Severity evidence is present. Scope is not explicitly stated in the report. Confirm actual scope before routing.`;
    }
  } else if (si === 2 && !textConfirmsScope && textHasPluralScope) {
    // Two-directional Sev2 rationale: explain why not Sev3 and why not Sev1
    const pluralHits = pluralScopeSignals.filter(s => new RegExp(`\\b${s}\\b`, "i").test(lower));
    sevRationale = `Classified Sev2 (Moderate). Sev3 is ruled out because the report uses plural language ("${pluralHits.slice(0,2).join('", "')}"), which suggests more than one caller is affected. Sev1 is ruled out because the report contains no qualifying language (such as "all calls", "many customers", or "widespread") that would confirm broad scope. Sev2 is the defensible middle ground. Escalate to Sev1 if scope is confirmed broader.`;
  } else {
    // No keyword evidence: severity was set by impact level alone or defaulted
    const impactDriven = severity.impactBoost && severity.impactBoost[impact] && severity.impactBoost[impact] > 0;
    if (impactDriven) {
      if (textHasPluralScope) {
        const pluralHits = pluralScopeSignals.filter(s => new RegExp(`\\b${s}\\b`, "i").test(lower));
        sevRationale = `No explicit severity keywords matched in the report text. The report uses plural language ("${pluralHits.slice(0,2).join('", "')}"), which confirms more than one caller is affected but does not quantify scale. ${severity.level} is defensible. Verify actual scope before escalating.`;
      } else {
        sevRationale = `No explicit severity keywords matched. Broad scope is suggested by language in the report. Verify the full extent of impact before routing.`;
      }
    } else {
      sevRationale = `No strong severity signals detected. Defaulting to ${severity.level} (${severity.label}) as a conservative baseline. Impact reported as "${impact}". Adjust if scope is confirmed broader or narrower.`;
    }
  }

  // Context-aware questions: override static list when evidence points to a specific sub-issue
  const primaryRouting = {...ROUTING[primary]};
  if (primary === "STT" && isMultilingual) {
    primaryRouting.qs = [
      "Accent or dialect of the affected caller (e.g. Mexican Spanish, Colombian Spanish, bilingual speaker)",
      "Whether the issue occurs throughout the call or only after specific prompts",
      "Whether the caller and agent begin in the same language before the language switch occurs",
      "Whether other callers with a similar language background have reported the same issue"
    ];
  } else if (primary === "TTS") {
    const ev = evidenceMap["TTS"].map(k => k.toLowerCase());
    const hasBargeIn = ev.some(k => ["barge-in","barge in","cuts off","mid-sentence","interrupts"].includes(k));
    const hasVoiceQuality = ev.some(k => ["robotic","garbled","voice sounds","voice quality","pronunciation","number pronunciation","reads the amount"].includes(k));
    const hasLatency = ev.some(k => ["8-12 seconds","speak back","voice response starts taking"].includes(k));
    if (hasBargeIn && !hasVoiceQuality) {
      primaryRouting.qs = [
        "Whether the agent stops speaking immediately when interrupted or continues talking over the caller",
        "Whether the issue occurs on every call or only in specific situations",
        "Whether callers with a particular speaking style or pace are more affected",
        "Approximate time window when the interruption issue was first noticed"
      ];
    } else if (hasVoiceQuality) {
      primaryRouting.qs = [
        "Whether the distortion is present on every call or only a subset",
        "Whether the issue affects all configured voices or only a specific voice",
        "Customer's description of what the voice sounded like",
        "Approximate time window when the issue was first noticed"
      ];
    } else if (hasLatency) {
      primaryRouting.qs = [
        "Whether the delay occurs at the start of the agent's response or mid-conversation",
        "Whether the delay is consistent or varies between calls",
        "Approximate time window when callers first started reporting the delay",
        "Whether the delay affects all calls or only calls of a particular type"
      ];
    }
  }

  // Step 3: severity confidence and overall confidence.
  // Severity confidence is High when severity keywords directly support the level.
  // It is Medium when severity is inferred from impact selection or unconfirmed scope.
  // It is Low when the system had to default with no signal at all.
  let confSevRationale, confOverall;
  let sevConfLevel;

  // Build tradeoff explanation based on both escalating and limiting signals
  const hasEscalating = sevEvidence.length > 0;
  const hasLimiting = sevLimitingEvidence.length > 0;

  if (hasComplianceRisk) {
    sevConfLevel = "High";
    confSevRationale = sevRationale;
  } else if (sevEvidence.length > 0 && !onlyImpactBoostDrivesS1) {
    const reportEvOnly = sevEvidence.filter(k => !k.includes("(impact level)")).slice(0, 3);
    const impactIsBroad = impact === "Many callers" || impact === "Outage";
    if (hasLimiting && impactIsBroad) {
      sevConfLevel = "Med";
      confSevRationale = `The report contains both escalating and limiting signals. The final severity reflects the balance between broad scope indicators and factors that reduce urgency. Verify actual scope before escalating.`;
    } else if (impactIsBroad) {
      sevConfLevel = "High";
      const escList = sevEvidence.filter(k => !k.includes("(impact level)")).slice(0,2).map(k => `"${k}"`).join(", ");
      confSevRationale = escList
        ? `The report contains specific severity signals (${escList}), and the selected impact level confirms broad scope. Both factors support the assigned severity.`
        : `The selected impact level confirms broad scope and supports the assigned severity.`;
    } else {
      sevConfLevel = "Med";
      confSevRationale = `Severity evidence is present but the selected impact level limits scope. Verify whether the issue is wider than reported before escalating.`;
    }
  } else if (onlyImpactBoostDrivesS1 || isDuplicateTransaction) {
    sevConfLevel = "Med";
    if (hasLimiting) {
      const limitingList = sevLimitingEvidence.slice(0,2).join("; ");
      confSevRationale = `The selected impact level supports escalation, but limiting signals are also present (${limitingList}). The customer workflow appears to succeed and the issue appears primarily operational. These limiting factors reduce the final severity. Verify actual scope.`;
    } else {
      confSevRationale = `No severity keywords were matched in the report text. Severity is based on the selected impact level. Verify actual scope before escalating.`;
    }
  } else if (textHasPluralScope && !textConfirmsScope && !sevEvidence.length) {
    sevConfLevel = "Med";
    confSevRationale = `No explicit severity keywords matched. Plural language in the report confirms more than one caller is affected but does not quantify scale. Verify actual scope before escalating.`;
  } else {
    sevConfLevel = "Med";
    confSevRationale = sevRationale;
  }

  // Overall confidence is the lower of bucket confidence and severity confidence.
  const confOrder = {"High": 2, "Med": 1, "Low": 0};
  const bucketConfLevel = confidence;
  const overallLevel = confOrder[bucketConfLevel] <= confOrder[sevConfLevel] ? bucketConfLevel : sevConfLevel;
  if (overallLevel !== confidence) confidence = overallLevel;

  confOverall = overallLevel === "High"
    ? `High confidence. Bucket ownership is clear and severity is directly supported by evidence in the report. The recommendation can be acted on.`
    : overallLevel === "Med"
    ? `Medium confidence. The core recommendation is reasonable, but at least one dimension , bucket ownership or severity scope , requires verification before routing.`
    : `Low confidence. The report contains insufficient signal to classify reliably. Manual review is required before routing.`;

  const confRationale = {
    bucket: confBucketRationale,
    severity: confSevRationale,
    overall: confOverall,
    bucketLevel: bucketConfLevel,
    severityLevel: sevConfLevel
  };

  // LLM interpreted evidence: when LLM is primary, compute which failure categories fired
  const llmFailureLabels = [];
  if (primary === "LLM") {
    for (const cat of LLM_FAILURE_CATEGORIES) {
      if (cat.signals.some(s => lower.includes(s.toLowerCase()))) {
        llmFailureLabels.push(cat.label);
      }
    }
  }

  // Context-aware INFRA: surface the most relevant first evidence item based on failure type
  if (primary === "INFRA") {
    const isOutbound = lower.includes("outbound") || lower.includes("dialed") || lower.includes("never receives a ring") ||
      lower.includes("carrier connect") || lower.includes("customer never receives") || lower.includes("not connected") ||
      lower.includes("no ring") || lower.includes("dial failed");
    const isWebhookOrEndpoint = lower.includes("webhook") || lower.includes("endpoint") || lower.includes("500 error") ||
      lower.includes("503") || lower.includes("api failure") || lower.includes("nothing is saving");
    const isRecording = lower.includes("recording") || lower.includes("file not found") || lower.includes("storage");

    if (isOutbound) {
      primaryRouting.qs = [
        "Three to five outbound attempt IDs or call records that reproduce the issue",
        "Approximate timestamps of the affected attempts",
        "Destination phone numbers (if policy allows)",
        "Carrier or dial-status information shown in your system, if available"
      ];
    } else if (isWebhookOrEndpoint) {
      primaryRouting.qs = [
        "The specific endpoint or request that is failing",
        "Affected time window and whether the issue is still ongoing",
        "Any error message visible to the reviewer or reported by the customer",
        "Whether the issue appeared suddenly or gradually worsened"
      ];
    } else if (isRecording) {
      primaryRouting.qs = [
        "The specific Call IDs or date range for which recordings are unavailable",
        "Affected time window and whether the issue is still ongoing",
        "Whether the issue affects one customer or multiple customers",
        "Any error message shown when attempting to retrieve the recording"
      ];
    }
    // If none of the above match, the static INFRA qs are used as fallback
  }

  return {
    primary, allSecondaries,
    confidence, confRationale,
    evidence: [...new Set(evidenceMap[primary])],
    llmFailureLabels,
    allEvidence: evidenceMap,
    severity, sevRationale,
    sevEvidence: [...new Set(sevEvidence)],
    sevLimitingEvidence,
    pluralScopeHits: pluralScopeSignals.filter(s => new RegExp(`\\b${s}\\b`, "i").test(lower)),
    textConfirmsScope,
    complianceRisk: hasComplianceRisk,
    complianceHits,
    routing: primaryRouting,
    bucketWhy: BUCKET_RULES.find(b => b.id === primary).why
  };
}

/* ─── CSV EXPORT ────────────────────────────────────────────────── */

function exportCSV(queue) {
  const esc = v => `"${String(v || "").replace(/"/g, '""')}"`;
  const ts = new Date().toLocaleString();
  const meta = [
    [esc("Prototype"), esc("Bug Triage Console")].join(","),
    [esc("Author"), esc("Esther Ajari")].join(","),
    [esc("Purpose"), esc("Founder's Office Case Study Submission")].join(","),
    [esc("Generated"), esc(ts)].join(","),
    ["", ""].join(","), // blank separator row
  ];
  const cols = [
    "Triage Timestamp","Customer","Call ID","Impact","Bug Report",
    "Primary Bucket","Secondary Bucket","Classification Evidence","Severity","Severity Evidence",
    "Confidence","Confidence Rationale","Primary Routing Team","Secondary Routing Team","Status",
    "Override Applied","Override Change Summary"
  ];
  const rows = queue.map(it => {
    const secEvidence = it.result.allSecondaries.flatMap(sid =>
      (it.result.allEvidence[sid] || []).filter(k=>k).slice(0,3).map(k=>`"${k}"`)
    ).join("; ");
    const classEvidence = [
      `Primary: ${it.result.evidence.map(e=>`"${e}"`).join(", ") || "None"}`,
      it.result.allSecondaries.length ? `Secondary: ${secEvidence || "No additional keyword matches"}` : ""
    ].filter(Boolean).join(" | ");
    return [
      it.timestamp,
      it.customer,
      it.callId || "",
      it.impact,
      it.text,
      it.finalBucket,
      it.result.allSecondaries.join("; ") || "None",
      classEvidence,
      it.finalSev,
      `${it.result.sevEvidence && it.result.sevEvidence.length ? it.result.sevEvidence.map(e=>`"${e}"`).join(", ") : "No severity keywords matched"}. ${it.finalSevRationale || it.result.sevRationale}`,
      it.result.confidence === "Med" ? "Medium" : it.result.confidence,
      `Bucket: ${it.result.confRationale.bucket} | Severity: ${it.result.confRationale.severity} | Overall: ${it.result.confRationale.overall}`,
      it.result.routing.team,
      it.result.allSecondaries.map(sid => ROUTING[sid]?.team || "").filter(Boolean).join("; "),
      it.status,
      it.overrideChangeSummary ? "Yes" : "No",
      it.overrideChangeSummary || ""
    ].map(esc).join(",");
  });
  const csv = [...meta, cols.map(esc).join(","), ...rows].join("\n");
  const blob = new Blob([csv], {type: "text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "esther-ajari-bug-triage-console.csv";
  a.click();
}
